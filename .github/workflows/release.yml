name: Windows Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller losslessbob.spec

      - name: Create data directory in dist
        run: mkdir dist\LosslessBob\data

      - name: Zip release
        run: |
          cd dist
          Compress-Archive -Path LosslessBob -DestinationPath LosslessBob-${{ github.ref_name }}-windows.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/LosslessBob-${{ github.ref_name }}-windows.zip
          generate_release_notes: true
