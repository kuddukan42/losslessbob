name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build backend binary (onefile)
        run: pyinstaller losslessbob_backend.spec

      - name: Compute version string
        id: version
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}" -replace '^v', ''
          "VERSION=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install gui_next dependencies
        working-directory: gui_next
        run: npm ci

      - name: Prepare build resources
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path gui_next\resources\backend
          Copy-Item dist\LosslessBobBackend.exe gui_next\resources\backend\LosslessBobBackend.exe

      - name: Build and package Windows app
        working-directory: gui_next
        run: npm run dist:win -- --config.extraMetadata.version=${{ steps.version.outputs.VERSION }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            gui_next/dist/*-windows-Setup.exe
            gui_next/dist/*-windows-portable.exe
          generate_release_notes: true

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgl1 upx-ucl fuse libfuse2

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build backend binary (onefile)
        run: pyinstaller losslessbob_backend.spec

      - name: Compute version string
        id: version
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install gui_next dependencies
        working-directory: gui_next
        run: npm ci

      - name: Prepare build resources
        run: |
          mkdir -p gui_next/resources/backend
          cp dist/LosslessBobBackend gui_next/resources/backend/LosslessBobBackend
          chmod +x gui_next/resources/backend/LosslessBobBackend

          # Generate 512×512 solid-blue placeholder icon
          python3 - << 'PYEOF'
          import struct, zlib
          def _w32(n): return struct.pack('>I', n)
          def _chunk(tag, data):
              payload = tag + data
              return _w32(len(data)) + payload + _w32(zlib.crc32(payload) & 0xffffffff)
          W = H = 512
          r, g, b = 26, 107, 204
          sig  = b'\x89PNG\r\n\x1a\n'
          ihdr = _chunk(b'IHDR', _w32(W) + _w32(H) + b'\x08\x02\x00\x00\x00')
          raw  = b''.join(b'\x00' + bytes([r, g, b] * W) for _ in range(H))
          idat = _chunk(b'IDAT', zlib.compress(raw, 9))
          iend = _chunk(b'IEND', b'')
          with open('gui_next/resources/losslessbob.png', 'wb') as f:
              f.write(sig + ihdr + idat + iend)
          PYEOF

      - name: Build and package AppImage
        working-directory: gui_next
        run: npm run dist:linux -- --config.extraMetadata.version=${{ steps.version.outputs.VERSION }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: gui_next/dist/*.AppImage
          generate_release_notes: true

  build-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags and labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/losslessbob
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
