name: Windows Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller losslessbob.spec

      - name: Create data directory in dist
        run: mkdir dist\LosslessBob\data

      # Strip leading 'v' so installer version is "1.0.3" not "v1.0.3"
      - name: Compute version string
        id: version
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}" -replace '^v', ''
          "VERSION=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # windows-latest includes Inno Setup 6 pre-installed
      - name: Build installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc /DAppVersion=${{ steps.version.outputs.VERSION }} tools\losslessbob.iss

      # Keep a portable zip alongside the installer for users who prefer it
      - name: Create portable zip
        shell: pwsh
        run: |
          Compress-Archive -Path dist\LosslessBob `
            -DestinationPath dist\LosslessBob-${{ steps.version.outputs.VERSION }}-windows-portable.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/LosslessBob-${{ steps.version.outputs.VERSION }}-windows-portable.zip
            tools/Output/LosslessBob_Setup_${{ steps.version.outputs.VERSION }}.exe
          generate_release_notes: true
