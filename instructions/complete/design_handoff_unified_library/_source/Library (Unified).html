<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>LosslessBob — Library (By recording)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app.css" />
<style>
  /* The app is a fixed 1920×1080 canvas, scaled to fit the viewport. */
  html, body { margin: 0; height: 100%; background: #0b0c0e; overflow: hidden; }
  #stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  #frame {
    width: 1920px; height: 1080px; flex: 0 0 1920px;
    transform-origin: center center;
    background: var(--lbb-bg, #141619);
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.45), 0 1px 0 rgba(255,255,255,0.04) inset;
    border-radius: 12px;
  }
  @media print { html, body, #stage { background: #fff; } #frame { box-shadow: none; border-radius: 0; } }
</style>
</head>
<body>
<div id="stage"><div id="frame"><div id="root"></div></div></div>

<!-- Pinned React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Design tokens — dark + slate frame by default to match the shipped app -->
<script src="lbb-tokens.js"></script>
<script>
  window.LBB_TOKENS.applyTheme({ mode: "dark", accent: "indigo", density: "default", palette: "slate" });
</script>

<!-- Data — both lenses read the same catalogue -->
<script src="library-data.js"></script>
<script src="perf-data.js"></script>

<!-- Primitives -->
<script type="text/babel" src="lbb-icons.jsx"></script>
<script type="text/babel">
  window.LBB_Icon = Icon;
</script>
<script type="text/babel" src="lbb-ui.jsx"></script>

<!-- Shared action system: row context menu + detail-panel action bar +
     Share&seed / Assets workflow blocks (one action vocabulary, two surfaces) -->
<script type="text/babel" src="libu-actions.jsx"></script>

<!-- Tweaks panel -->
<script type="text/babel" src="tweaks-panel.jsx"></script>

<!-- Shell + both Library lenses + merged app -->
<script type="text/babel" src="app-shell.jsx"></script>
<script type="text/babel" src="library-parts.jsx"></script>
<script type="text/babel" src="perf-parts.jsx"></script>
<script type="text/babel" src="libu-recording.jsx"></script>
<script type="text/babel" src="libu-performance.jsx"></script>
<script type="text/babel" src="libu-app.jsx"></script>

<script type="text/babel">
  function fit() {
    const stage = document.getElementById("stage");
    const frame = document.getElementById("frame");
    const scale = Math.min(stage.clientWidth / 1920, stage.clientHeight / 1080);
    frame.style.transform = `scale(${scale})`;
  }
  window.addEventListener("resize", fit);
  fit();

  ReactDOM.createRoot(document.getElementById("root")).render(<window.LBB_LibUnifiedApp defaultView="recording" />);
</script>
</body>
</html>
