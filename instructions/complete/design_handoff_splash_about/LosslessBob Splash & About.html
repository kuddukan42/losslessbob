<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LosslessBob — Splash & About</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#131110"/>
    <rect x="22" y="30" width="56" height="40" fill="none" stroke="#f1ecdf" stroke-width="2.5"/>
    <rect x="28" y="36" width="44" height="28" fill="none" stroke="#f1ecdf" stroke-width="1" opacity="0.4"/>
    <rect x="40" y="44" width="20" height="12" rx="3" fill="#5b8df2"/>
  </svg>
</template>
<style>
  :root { --lbb-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: "Inter", ui-sans-serif, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  /* hide scrollbars inside the dark dialogs (kept scrollable) */
  .dc-card *::-webkit-scrollbar { width: 0; height: 0; }
  .dc-card * { scrollbar-width: none; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- design system -->
<script src="lbb-tokens.js"></script>
<script type="text/babel" src="lbb-icons.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<!-- launch screens -->
<script src="lbb-launch-data.js"></script>
<script type="text/babel" src="lbb-launch-parts.jsx"></script>
<script type="text/babel" src="splash-variants.jsx"></script>
<script type="text/babel" src="about-parts.jsx"></script>
<script type="text/babel" src="about-variants.jsx"></script>

<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard } = window;

  // Dark + indigo, as requested.
  window.LBB_TOKENS.applyTheme({ mode: "dark", accent: "indigo", density: "default" });

  function App() {
    const { SplashClassic, SplashTerminal, SplashDraw,
            AboutSingle, AboutRail, AboutTabbed } = window;
    return (
      <DesignCanvas>
        <DCSection id="splash" title="Startup splash" subtitle="real boot trace · ~2.4s cold start · double-square frame · click any to replay">
          <DCArtboard id="splash-classic"  label="A · Launch card · BUILD"   width={900} height={560}><SplashClassic /></DCArtboard>
          <DCArtboard id="splash-terminal" label="B · Boot log"      width={900} height={560}><SplashTerminal /></DCArtboard>
          <DCArtboard id="splash-draw"     label="C · Draw-in"       width={900} height={560}><SplashDraw /></DCArtboard>
        </DCSection>

        <DCSection id="about" title="About" subtitle="Tech specs · acknowledgements · changelog · links">
          <DCArtboard id="about-single"  label="A · Single column"   width={720} height={660}><AboutSingle /></DCArtboard>
          <DCArtboard id="about-rail"    label="B · Info rail"       width={720} height={660}><AboutRail /></DCArtboard>
          <DCArtboard id="about-tabbed"  label="C · Tabbed"          width={720} height={660}><AboutTabbed /></DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
