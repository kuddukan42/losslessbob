  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

nge: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* greek */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"39c555b4-1964-44c7-a16f-13632f294a56\") format('woff2');\n  unicode-range: U+0370-0377, U+037A-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"d00da128-e6c3-4c29-8128-0a8f2d548cff\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"77930207-0fae-4621-946d-fb3e27b21482\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"d4671d37-1a9e-413c-a936-64cb95c135bd\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   LosslessBob — Unified Library Pixel Spec · print stylesheet\n   Letter portrait, 96dpi.  Uses LBB light-mode tokens verbatim.\n   ============================================================ */\n:root{\n  --bg:#faf8f3; --surface:#ffffff; --surface2:#f1efe7; --surface3:#e7e4d8;\n  --border:#e2dfd2; --border2:#c8c3b1;\n  --fg:#1c1a17; --fg2:#5b554a; --fg3:#8e8676;\n  --accent:#2b5fd0; --accent-hi:#3a6cdb; --accent-lo:#1f4baa; --accent-soft:#e3ebf8;\n  --ok-fg:#1f7a3e; --ok-bg:#e7f2e2; --ok-bar:#39a360;\n  --warn-fg:#9a6800; --warn-bg:#f8eed3; --warn-bar:#cc9f3d;\n  --bad-fg:#b03f30; --bad-bg:#fbe6df; --bad-bar:#d8604f;\n  --info-fg:#1f5b8f; --info-bg:#e2ecf6; --info-bar:#4c89c4;\n  --mute-fg:#8a8473; --mute-bg:#ecebe4; --mute-bar:#a8a293;\n  --sans:\"Inter\",-apple-system,BlinkMacSystemFont,\"Segoe UI\",system-ui,sans-serif;\n  --mono:\"JetBrains Mono\",ui-monospace,SFMono-Regular,Menlo,monospace;\n  --page:816px; --margin:64px;\n}\n*{box-sizing:border-box;}\nhtml,body{margin:0;padding:0;}\nbody{\n  background:#6b6557; font-family:var(--sans); color:var(--fg);\n  font-size:13px; line-height:1.5; -webkit-font-smoothing:antialiased;\n  text-rendering:optimizeLegibility; padding:28px 0;\n}\n.page{\n  width:var(--page); min-height:1056px; margin:0 auto 28px; background:var(--bg);\n  padding:var(--margin) 60px; position:relative;\n  box-shadow:0 6px 28px rgba(0,0,0,.32);\n}\n.page::after{\n  content:attr(data-folio); position:absolute; bottom:30px; right:60px;\n  font-family:var(--mono); font-size:9.5px; color:var(--fg3); letter-spacing:.04em;\n}\n.page::before{\n  content:\"LOSSLESSBOB · UNIFIED LIBRARY — PIXEL SPECIFICATION\";\n  position:absolute; top:30px; left:60px; right:60px;\n  font-size:8.5px; font-weight:700; letter-spacing:.18em; color:var(--fg3);\n  border-bottom:1px solid var(--border); padding-bottom:8px;\n}\n\n/* ── Type roles ─────────────────────────────────────── */\nh1{font-size:34px; font-weight:700; letter-spacing:-.02em; line-height:1.05; margin:0 0 14px;}\nh2{font-size:20px; font-weight:700; letter-spacing:-.01em; margin:38px 0 4px; color:var(--fg);\n   padding-top:14px; border-top:2px solid var(--fg); display:flex; align-items:baseline; gap:10px;}\nh2 .sec{font-family:var(--mono); font-size:13px; font-weight:700; color:var(--accent);}\nh3{font-size:15px; font-weight:700; margin:24px 0 8px; color:var(--fg);}\nh4{font-size:12px; font-weight:700; margin:16px 0 6px; color:var(--fg2);\n   text-transform:uppercase; letter-spacing:.06em;}\np{margin:0 0 10px; max-width:60ch;}\np.lead{font-size:14.5px; line-height:1.55; color:var(--fg2); max-width:64ch;}\nstrong{font-weight:600;}\ncode,.m{font-family:var(--mono); font-size:.88em; background:var(--surface2);\n  border:1px solid var(--border); border-radius:3px; padding:.5px 4px; color:var(--accent-lo);\n  white-space:nowrap;}\n.muted{color:var(--fg3);}\na{color:var(--accent); text-decoration:none;}\n\n/* ── Eyebrow / cover ────────────────────────────────── */\n.eyebrow{font-size:10px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:var(--accent); margin-bottom:18px;}\n.cover-meta{display:grid; grid-template-columns:120px 1fr; gap:7px 16px; margin-top:30px;\n  font-size:12px; border-top:1px solid var(--border); padding-top:20px; max-width:520px;}\n.cover-meta dt{font-weight:700; color:var(--fg3); text-transform:uppercase; font-size:10px; letter-spacing:.06em; padding-top:2px;}\n.cover-meta dd{margin:0; color:var(--fg2);}\n\n/* ── Callouts ───────────────────────────────────────── */\n.note{padding:12px 14px; border-radius:8px; font-size:12px; line-height:1.5; margin:14px 0; border:1px solid;}\n.note.problem{background:var(--bad-bg); border-color:color-mix(in srgb,var(--bad-bar) 45%,transparent); color:#7a2c20;}\n.note.fix{background:var(--ok-bg); border-color:color-mix(in srgb,var(--ok-bar) 45%,transparent); color:#185f30;}\n.note.info{background:var(--info-bg); border-color:color-mix(in srgb,var(--info-bar) 40%,transparent); color:#184a73;}\n.note .lab{font-weight:700; text-transform:uppercase; font-size:9.5px; letter-spacing:.1em; display:block; margin-bottom:4px;}\n\n/* ── Spec tables ────────────────────────────────────── */\ntable.spec{width:100%; table-layout:fixed; border-collapse:separate; border-spacing:0; font-size:11px; margin:12px 0 8px;\n  border:1px solid var(--border2); border-radius:7px; overflow:hidden; background:var(--surface);}\ntable.spec td,table.spec th{overflow-wrap:anywhere;}\ntable.spec caption{caption-side:top; text-align:left; font-size:11px; font-weight:700; color:var(--fg2);\n  padding:0 0 7px; letter-spacing:.02em;}\ntable.spec th{background:var(--surface2); text-align:left; font-size:9px; font-weight:700;\n  letter-spacing:.07em; text-transform:uppercase; color:var(--fg3); padding:7px 9px;\n  border-bottom:1px solid var(--border2); vertical-align:bottom;}\ntable.spec td{padding:6px 9px; border-bottom:1px solid var(--border); vertical-align:top; color:var(--fg2);}\ntable.spec tr:last-child td{border-bottom:none;}\ntable.spec tr:nth-child(even) td{background:color-mix(in srgb,var(--surface2) 35%,transparent);}\ntable.spec td.k{font-weight:600; color:var(--fg); white-space:nowrap;}\ntable.spec td.v{font-family:var(--mono); font-size:10px; color:var(--accent-lo); white-space:normal; word-break:break-word; overflow-wrap:anywhere;}\ntable.spec td.was{font-family:var(--mono); font-size:10px; color:var(--bad-fg); white-space:normal; word-break:break-word; overflow-wrap:anywhere;}\ntable.spec td.now{font-family:var(--mono); font-size:10px; color:var(--ok-fg); white-space:normal; word-break:break-word; overflow-wrap:anywhere; font-weight:600;}\ntable.spec.tight td,table.spec.tight th{padding:4.5px 8px;}\n.swatch{display:inline-block; width:11px; height:11px; border-radius:3px; border:1px solid rgba(0,0,0,.12); vertical-align:-1px; margin-right:5px;}\n\n/* ── Token chips row ───────────────────────────────── */\n.scale-demo{display:flex; flex-direction:column; gap:0; border:1px solid var(--border2); border-radius:8px; overflow:hidden; margin:12px 0;}\n.scale-row{display:grid; grid-template-columns:96px 64px 1fr; align-items:baseline; gap:14px;\n  padding:9px 14px; border-bottom:1px solid var(--border); background:var(--surface);}\n.scale-row:last-child{border-bottom:none;}\n.scale-row:nth-child(even){background:color-mix(in srgb,var(--surface2) 40%,transparent);}\n.scale-row .tok{font-family:var(--mono); font-size:10.5px; color:var(--accent-lo); font-weight:600;}\n.scale-row .px{font-family:var(--mono); font-size:10px; color:var(--fg3); text-align:right;}\n.scale-row .samp{color:var(--fg); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}\n\n/* ── Anatomy figures ───────────────────────────────── */\n.fig{border:1px solid var(--border2); border-radius:8px; overflow:hidden; margin:14px 0 6px; background:var(--surface);}\n.fig-cap{font-size:10px; color:var(--fg3); margin:0 0 14px; font-style:italic;}\n.fig img{display:block; width:100%;}\n.callno{display:inline-flex; align-items:center; justify-content:center; width:16px; height:16px;\n  border-radius:50%; background:var(--accent); color:#fff; font-size:9px; font-weight:700; flex-shrink:0;}\nol.calls{list-style:none; margin:10px 0; padding:0; counter-reset:c; display:grid; gap:6px;}\nol.calls li{display:grid; grid-template-columns:18px 1fr; gap:9px; font-size:11px; align-items:start; counter-increment:c;}\nol.calls li::before{content:counter(c); display:inline-flex; align-items:center; justify-content:center;\n  width:16px; height:16px; border-radius:50%; background:var(--accent); color:#fff; font-size:9px; font-weight:700; margin-top:1px;}\n\n/* ── Before/after split ────────────────────────────── */\n.ba{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:12px 0;}\n.ba .col{border:1px solid var(--border2); border-radius:8px; padding:12px 13px; background:var(--surface);}\n.ba .col.before{border-color:color-mix(in srgb,var(--bad-bar) 40%,transparent);}\n.ba .col.after{border-color:color-mix(in srgb,var(--ok-bar) 40%,transparent);}\n.ba .col h5{margin:0 0 8px; font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;}\n.ba .col.before h5{color:var(--bad-fg);}\n.ba .col.after h5{color:var(--ok-fg);}\n.ba ul{margin:0; padding-left:16px; font-size:11px; color:var(--fg2);}\n.ba li{margin-bottom:5px;}\n\n/* live pill samples */\n.pill{display:inline-flex; align-items:center; gap:4px; padding:1px 7px; border-radius:999px;\n  font-size:10px; font-weight:600; line-height:1.5;}\n.pill .dot{width:6px;height:6px;border-radius:50%;background:currentColor;}\n.pill.ok{color:var(--ok-fg);background:var(--ok-bg);}\n.pill.warn{color:var(--warn-fg);background:var(--warn-bg);}\n.pill.bad{color:var(--bad-fg);background:var(--bad-bg);}\n.pill.info{color:var(--info-fg);background:var(--info-bg);}\n.pill.mute{color:var(--mute-fg);background:var(--mute-bg);}\n.src{display:inline-flex;align-items:center;justify-content:center;min-width:30px;height:18px;padding:0 5px;\n  border-radius:4px;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.3px;}\n.src.sbd{color:var(--ok-fg);background:color-mix(in srgb,var(--ok-fg) 16%,transparent);border:1px solid color-mix(in srgb,var(--ok-fg) 42%,transparent);}\n.src.aud{color:var(--fg2);border:1px solid var(--border2);}\n.src.fm{color:var(--info-fg);background:color-mix(in srgb,var(--info-fg) 16%,transparent);border:1px solid color-mix(in srgb,var(--info-fg) 42%,transparent);}\n\n.tag-row{display:flex; flex-wrap:wrap; gap:6px; align-items:center; margin:8px 0 12px;}\nul.clean{margin:8px 0; padding-left:18px; font-size:12px; color:var(--fg2);}\nul.clean li{margin-bottom:5px;}\nul.clean li::marker{color:var(--accent);}\n.kbd{font-family:var(--mono); font-size:10px; background:var(--surface); border:1px solid var(--border2);\n  border-bottom-width:2px; border-radius:4px; padding:1px 5px; color:var(--fg);}\n\n.toc{margin:26px 0 0; columns:2; column-gap:36px; font-size:12px;}\n.toc a{display:flex; justify-content:space-between; gap:8px; padding:5px 0; border-bottom:1px solid var(--border);\n  color:var(--fg2); break-inside:avoid;}\n.toc a .n{font-family:var(--mono); color:var(--fg3); font-size:10px;}\n.toc a strong{font-weight:600; color:var(--fg);}\n\n.divider{height:1px; background:var(--border); margin:20px 0;}\n.spec-grid{display:grid; grid-template-columns:1fr 1fr; gap:18px;}\n\n@media print{\n  body{background:#fff; padding:0;}\n  .page{box-shadow:none; margin:0 auto; width:auto; min-height:auto; page-break-after:always;}\n  .page::before,.page::after{color:#999;}\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n<!-- ════════ PAGE 1 · COVER ════════ -->\n<section class=\"page\" data-folio=\"01\">\n  <div class=\"eyebrow\">LosslessBob · GUI&nbsp;Next · Pixel Specification<\u002Fdiv>\n  <h1>Unified Library<br>Visual Refinement Spec<\u002Fh1>\n  <p class=\"lead\">A complete, build-ready specification for refining the Unified Library screen — typography normalization and the conversion of the right-hand detail panel into a tabbed interface, across both the <strong>By&nbsp;performance<\u002Fstrong> and <strong>By&nbsp;recording<\u002Fstrong> lenses.<\u002Fp>\n\n  <dl class=\"cover-meta\">\n    <dt>Repository<\u002Fdt><dd>kuddukan42/losslessbob @ <span class=\"m\">main<\u002Fspan><\u002Fdd>\n    <dt>Surface<\u002Fdt><dd>gui_next · renderer · Library screen<\u002Fdd>\n    <dt>Primary files<\u002Fdt><dd><span class=\"m\">screens/ScreenLibrary.tsx<\u002Fspan>, <span class=\"m\">components/library/DetailPanel.tsx<\u002Fspan><\u002Fdd>\n    <dt>Token source<\u002Fdt><dd><span class=\"m\">lib/tokens.ts<\u002Fspan> — <strong>dark mode · slate frame palette · indigo accent<\u002Fstrong> · default density (how production runs). Light values listed for the theme toggle.<\u002Fdd>\n    <dt>Reference build<\u002Fdt><dd>Unified Library (refined).html<\u002Fdd>\n    <dt>Scope<\u002Fdt><dd>Visual only. No data-contract, routing, or API changes.<\u002Fdd>\n    <dt>Status<\u002Fdt><dd>For implementation<\u002Fdd>\n  <\u002Fdl>\n\n  <div class=\"note info\" style=\"margin-top:34px\">\n    <span class=\"lab\">How to read this document<\u002Fspan>\n    Every value here is literal and final. Where a property reads <span class=\"m\">12.5px / 600<\u002Fspan>, ship exactly that. Colors are always the LBB CSS variable, never a raw hex in component code — the hex shown in swatches is the resolved value from <span class=\"m\">tokens.ts<\u002Fspan> for reference. <strong>This build targets dark mode (slate frame + indigo accent), which is how the app ships<\u002Fstrong>; §3 lists both the dark (primary) and light hex per token. “Was” columns quote the current <span class=\"m\">main<\u002Fspan> implementation; “Now” columns are the target.\n  <\u002Fdiv>\n\n  <div class=\"toc\">\n    <a href=\"#s1\"><span><span class=\"n\">§1<\u002Fspan> &nbsp;<strong>The problem<\u002Fstrong><\u002Fspan><span class=\"n\">02<\u002Fspan><\u002Fa>\n    <a href=\"#s2\"><span><span class=\"n\">§2<\u002Fspan> &nbsp;<strong>Type scale<\u002Fstrong><\u002Fspan><span class=\"n\">03<\u002Fspan><\u002Fa>\n    <a href=\"#s3\"><span><span class=\"n\">§3<\u002Fspan> &nbsp;<strong>Foundations<\u002Fstrong><\u002Fspan><span class=\"n\">04<\u002Fspan><\u002Fa>\n    <a href=\"#s4\"><span><span class=\"n\">§4<\u002Fspan> &nbsp;<strong>Top chrome<\u002Fstrong><\u002Fspan><span class=\"n\">05<\u002Fspan><\u002Fa>\n    <a href=\"#s5\"><span><span class=\"n\">§5<\u002Fspan> &nbsp;<strong>Performance table<\u002Fstrong><\u002Fspan><span class=\"n\">06<\u002Fspan><\u002Fa>\n    <a href=\"#s6\"><span><span class=\"n\">§6<\u002Fspan> &nbsp;<strong>Recording table<\u002Fstrong><\u002Fspan><span class=\"n\">07<\u002Fspan><\u002Fa>\n    <a href=\"#s7\"><span><span class=\"n\">§7<\u002Fspan> &nbsp;<strong>Pills &amp; badges<\u002Fstrong><\u002Fspan><span class=\"n\">08<\u002Fspan><\u002Fa>\n    <a href=\"#s8\"><span><span class=\"n\">§8<\u002Fspan> &nbsp;<strong>Detail panel — shell<\u002Fstrong><\u002Fspan><span class=\"n\">09<\u002Fspan><\u002Fa>\n    <a href=\"#s9\"><span><span class=\"n\">§9<\u002Fspan> &nbsp;<strong>Performance panel tabs<\u002Fstrong><\u002Fspan><span class=\"n\">10<\u002Fspan><\u002Fa>\n    <a href=\"#s10\"><span><span class=\"n\">§10<\u002Fspan> <strong>Recording panel tabs<\u002Fstrong><\u002Fspan><span class=\"n\">11<\u002Fspan><\u002Fa>\n    <a href=\"#s11\"><span><span class=\"n\">§11<\u002Fspan> <strong>Interactions<\u002Fstrong><\u002Fspan><span class=\"n\">12<\u002Fspan><\u002Fa>\n    <a href=\"#s12\"><span><span class=\"n\">§12<\u002Fspan> <strong>File-by-file map<\u002Fstrong><\u002Fspan><span class=\"n\">13<\u002Fspan><\u002Fa>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════ PAGE 2 · THE PROBLEM ════════ -->\n<section class=\"page\" data-folio=\"02\" id=\"s1\">\n  <h2><span class=\"sec\">§1<\u002Fspan> The problem — typographic entropy<\u002Fh2>\n  <p class=\"lead\">The Library screen renders at <strong>fourteen distinct font sizes<\u002Fstrong> and <strong>six font weights<\u002Fstrong>, set inline as raw pixel literals and as <span class=\"m\">--lbb-fs-*<\u002Fspan> tokens, with no role mapping. Sizes drift by half-pixels between visually identical elements; weight jumps between <span class=\"m\">650<\u002Fspan>, <span class=\"m\">700<\u002Fspan> and <span class=\"m\">800<\u002Fspan> read as noise rather than hierarchy.<\u002Fp>\n\n  <h3>Audit — every size/weight currently in the screen<\u002Fh3>\n  <table class=\"spec tight\">\n    <caption>Sourced from <span class=\"m\">ScreenLibrary.tsx<\u002Fspan> + <span class=\"m\">DetailPanel.tsx<\u002Fspan> on <span class=\"m\">main<\u002Fspan>. Each row is at least one live occurrence.<\u002Fcaption>\n    <thead><tr><th>Value as written<\u002Fth><th>Form<\u002Fth><th>Seen on<\u002Fth><th>Problem<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td class=\"v\">fontSize: 9<\u002Ftd><td>raw px<\u002Ftd><td>family tag pills, “rec” sub-count<\u002Ftd><td>below legibility floor<\u002Ftd><\u002Ftr>\n      <tr><td class=\"v\">var(--lbb-fs-9)<\u002Ftd><td>token<\u002Ftd><td>recording sub-count<\u002Ftd><td>duplicate of the above at a different call site<\u002Ftd><\u002Ftr>\n      <tr><td class=\"v\">var(--lbb-fs-9-5)<\u002Ftd><td>token<\u002Ftd><td>day-of-week, unconfirmed pill<\u002Ftd><td>—<\u002Ftd><\u002Ftr>\n      <tr><td class=\"v\">fontSize: 10<\u002Ftd><td>raw px<\u002Ftd><td>facet badge, source badge, fact label, match chip<\u002Ftd><td>four roles collapsed onto one size<\u002Ftd><\u002Ftr>\n      <tr><td class=\"v\">fontSize: 10.5<\u002Ftd><td>raw px<\u002Ftd><td>lens count, member source, stat sub, uploads<\u002Ftd><td>—<\u002Ftd><\u002Ftr>\n      <tr><td class=\"v\">var(--lbb-fs-10-5)<\u002Ftd><td>token<\u002Ftd><td>zone labels, log filter chips<\u002Ftd><td>same size, second spelling<\u002Ftd><\u002Ftr>\n      <tr><td class=\"v\">fontSize: 11<\u002Ftd><td>raw px<\u002Ftd><td>active-filter chip, member glyph, fam count<\u002Ftd><td>—<\u002Ftd><\u002Ftr>\n      <tr><td class=\"v\">var(--lbb-fs-11)<\u002Ftd><td>token<\u002Ftd><td>city line, tree glyph, conf date<\u002Ftd><td>same size, second spelling<\u002Ftd><\u002Ftr>\n      <tr><td class=\"v\">fontSize: 11.5<\u002Ftd><td>raw px<\u002Ftd><td>member LB#, setlist row, match-chip<\u002Ftd><td>—<\u002Ftd><\u002Ftr>\n      <tr><td class=\"v\">var(--lbb-fs-11-5)<\u002Ftd><td>token<\u002Ftd><td>desc, folder, tour, catalog note<\u002Ftd><td>same size, second spelling<\u002Ftd><\u002Ftr>\n      <tr><td class=\"v\">fontSize: 12 / var(--lbb-fs-12)<\u002Ftd><td>both<\u002Ftd><td>filter pills, summary, empty state<\u002Ftd><td>two spellings of the body size<\u002Ftd><\u002Ftr>\n      <tr><td class=\"v\">fontSize: 12.5<\u002Ftd><td>raw px<\u002Ftd><td>lens buttons, perf-view rows, fam name<\u002Ftd><td>—<\u002Ftd><\u002Ftr>\n      <tr><td class=\"v\">fontSize: 13<\u002Ftd><td>raw px<\u002Ftd><td>base <span class=\"m\">--lbb-font-size<\u002Fspan><\u002Ftd><td>—<\u002Ftd><\u002Ftr>\n      <tr><td class=\"v\">var(--lbb-fs-15)<\u002Ftd><td>token<\u002Ftd><td>empty-state heading<\u002Ftd><td>—<\u002Ftd><\u002Ftr>\n      <tr><td class=\"v\">fontSize: 16 / 18<\u002Ftd><td>raw px<\u002Ftd><td>panel LB#, stat value<\u002Ftd><td>—<\u002Ftd><\u002Ftr>\n      <tr><td class=\"v\">fontWeight: 400/500/600/650/700/800<\u002Ftd><td>raw<\u002Ftd><td>everywhere<\u002Ftd><td>six weights; <span class=\"m\">650<\u002Fspan> &amp; <span class=\"m\">800<\u002Fspan> are off-ramp<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n\n  <div class=\"ba\">\n    <div class=\"col before\">\n      <h5>Before<\u002Fh5>\n      <ul>\n        <li>14 sizes · 6 weights, inline<\u002Fli>\n        <li>Two spellings for <span class=\"m\">10.5 / 11 / 11.5 / 12<\u002Fspan> (raw px <em>and<\u002Fem> token)<\u002Fli>\n        <li>Half-pixel drift between identical roles<\u002Fli>\n        <li><span class=\"m\">650<\u002Fspan> / <span class=\"m\">800<\u002Fspan> weights with no system meaning<\u002Fli>\n        <li>No semantic role → impossible to restyle globally<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div class=\"col after\">\n      <h5>After<\u002Fh5>\n      <ul>\n        <li>9 sizes mapped to <strong>named roles<\u002Fstrong><\u002Fli>\n        <li>4 weights: <span class=\"m\">400 / 500 / 600 / 700<\u002Fspan><\u002Fli>\n        <li>One variable per role; zero raw literals in markup<\u002Fli>\n        <li><span class=\"m\">650→600<\u002Fspan>, <span class=\"m\">800→700<\u002Fspan> everywhere<\u002Fli>\n        <li>Restyle the whole screen by editing 9 variables<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"note fix\">\n    <span class=\"lab\">Net change<\u002Fspan>\n    Every <span class=\"m\">fontSize<\u002Fspan>/<span class=\"m\">fontWeight<\u002Fspan> declaration in the two files is replaced by a role variable from §2. The <span class=\"m\">--lbb-fs-*<\u002Fspan> generator in <span class=\"m\">tokens.ts<\u002Fspan> stays (other screens use it) but the Library screen no longer references it directly.\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════ PAGE 3 · TYPE SCALE ════════ -->\n<section class=\"page\" data-folio=\"03\" id=\"s2\">\n  <h2><span class=\"sec\">§2<\u002Fspan> The type scale — nine roles<\u002Fh2>\n  <p class=\"lead\">Declare these nine variables once on <span class=\"m\">:root<\u002Fspan> (or the Library root). Each maps a single pixel size + intended weight to a name. All sizes assume the default density / <span class=\"m\">fontSize:13<\u002Fspan> base; they do not scale per-row because the Library uses a fixed reading size.<\u002Fp>\n\n  <div class=\"scale-demo\">\n    <div class=\"scale-row\"><span class=\"tok\">--t-display<\u002Fspan><span class=\"px\">22px<\u002Fspan><span class=\"samp\" style=\"font-size:22px;font-weight:700;letter-spacing:-.01em\">1975-12-04<\u002Fspan><\u002Fdiv>\n    <div class=\"scale-row\"><span class=\"tok\">--t-title<\u002Fspan><span class=\"px\">15px<\u002Fspan><span class=\"samp\" style=\"font-size:15px;font-weight:600\">Forum de Montréal<\u002Fspan><\u002Fdiv>\n    <div class=\"scale-row\"><span class=\"tok\">--t-strong<\u002Fspan><span class=\"px\">13px<\u002Fspan><span class=\"samp\" style=\"font-size:13px;font-weight:600\">Family A · card title<\u002Fspan><\u002Fdiv>\n    <div class=\"scale-row\"><span class=\"tok\">--t-body<\u002Fspan><span class=\"px\">12.5px<\u002Fspan><span class=\"samp\" style=\"font-size:12.5px\">Default reading size — rows &amp; descriptions<\u002Fspan><\u002Fdiv>\n    <div class=\"scale-row\"><span class=\"tok\">--t-meta<\u002Fspan><span class=\"px\">11.5px<\u002Fspan><span class=\"samp\" style=\"font-size:11.5px;color:var(--fg3)\">Secondary meta · captions · city line<\u002Fspan><\u002Fdiv>\n    <div class=\"scale-row\"><span class=\"tok\">--t-label<\u002Fspan><span class=\"px\">10.5px<\u002Fspan><span class=\"samp\" style=\"font-size:10.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--fg3)\">Zone label / eyebrow<\u002Fspan><\u002Fdiv>\n    <div class=\"scale-row\"><span class=\"tok\">--t-micro<\u002Fspan><span class=\"px\">10px<\u002Fspan><span class=\"samp\" style=\"font-size:10px;font-weight:600\">Pill text · counts · badges<\u002Fspan><\u002Fdiv>\n    <div class=\"scale-row\"><span class=\"tok\">--t-mono<\u002Fspan><span class=\"px\">11.5px<\u002Fspan><span class=\"samp\" style=\"font-family:var(--mono);font-size:11.5px\">LB-04412 · 1975-12-04<\u002Fspan><\u002Fdiv>\n    <div class=\"scale-row\"><span class=\"tok\">--t-mono-sm<\u002Fspan><span class=\"px\">10.5px<\u002Fspan><span class=\"samp\" style=\"font-family:var(--mono);font-size:10.5px\">timestamps · tree glyphs<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n\n  <h3>Weight ramp<\u002Fh3>\n  <table class=\"spec tight\">\n    <thead><tr><th>Variable<\u002Fth><th>Value<\u002Fth><th>Role<\u002Fth><th>Replaces<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td class=\"k\">--w-reg<\u002Ftd><td class=\"v\">400<\u002Ftd><td>body, un-emphasized rows<\u002Ftd><td class=\"was\">400<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">--w-med<\u002Ftd><td class=\"v\">500<\u002Ftd><td>controls, inactive tabs, meta emphasis<\u002Ftd><td class=\"was\">500<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">--w-semi<\u002Ftd><td class=\"v\">600<\u002Ftd><td>titles, active controls, emphasized data<\u002Ftd><td class=\"was\">600 · 650<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">--w-bold<\u002Ftd><td class=\"v\">700<\u002Ftd><td>display, eyebrows, stat values, badges<\u002Ftd><td class=\"was\">700 · 800<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n\n  <h3>Role → element binding (authoritative)<\u002Fh3>\n  <table class=\"spec tight\">\n    <thead><tr><th>Element<\u002Fth><th>Role<\u002Fth><th>Weight<\u002Fth><th>Was<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td class=\"k\">Panel headline (show date)<\u002Ftd><td class=\"now\">--t-display<\u002Ftd><td class=\"v\">700<\u002Ftd><td class=\"was\">16 / 18 · 700<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Venue, family card primary<\u002Ftd><td class=\"now\">--t-title<\u002Ftd><td class=\"v\">600<\u002Ftd><td class=\"was\">12.5 · 700<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Card titles, fam name, member desc emphasis<\u002Ftd><td class=\"now\">--t-strong<\u002Ftd><td class=\"v\">600<\u002Ftd><td class=\"was\">12.5 · 700<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Table rows, venue, tour, descriptions<\u002Ftd><td class=\"now\">--t-body<\u002Ftd><td class=\"v\">400–600<\u002Ftd><td class=\"was\">12 / 12.5 / 13<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">City, sub-meta, setlist, log, catalog note<\u002Ftd><td class=\"now\">--t-meta<\u002Ftd><td class=\"v\">400–500<\u002Ftd><td class=\"was\">11 / 11.5<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Column headers, zone labels, eyebrows<\u002Ftd><td class=\"now\">--t-label<\u002Ftd><td class=\"v\">700<\u002Ftd><td class=\"was\">10 / 10.5 · 700<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Pills, source/match badges, counts<\u002Ftd><td class=\"now\">--t-micro<\u002Ftd><td class=\"v\">600–700<\u002Ftd><td class=\"was\">9 / 10 / 11<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">LB#, dates, ×count (table)<\u002Ftd><td class=\"now\">--t-mono<\u002Ftd><td class=\"v\">600<\u002Ftd><td class=\"was\">11 / 11.5<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Tree glyphs, log timestamps, setlist #<\u002Ftd><td class=\"now\">--t-mono-sm<\u002Ftd><td class=\"v\">400–500<\u002Ftd><td class=\"was\">10.5 / 11<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n\n  <div class=\"note info\">\n    <span class=\"lab\">Eyebrow tracking<\u002Fspan>\n    All uppercase labels (<span class=\"m\">--t-label<\u002Fspan>) use <span class=\"m\">letter-spacing: 0.09em<\u002Fspan> via <span class=\"m\">--track-eyebrow<\u002Fspan>. This replaces the inconsistent <span class=\"m\">0.04 / 0.06 / 0.08 / 0.1 / 0.12em<\u002Fspan> values found across zone labels and column headers.\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════ PAGE 4 · FOUNDATIONS ════════ -->\n<section class=\"page\" data-folio=\"04\" id=\"s3\">\n  <h2><span class=\"sec\">§3<\u002Fspan> Foundations — color tokens<\u002Fh2>\n  <p class=\"lead\">No token <em>values<\u002Fem> change — these are reproduced verbatim from <span class=\"m\">tokens.ts<\u002Fspan> so the spe Ftd><\u002Ftr>\n      <tr><td class=\"k\">Show row<\u002Ftd><td class=\"v\">pad 6 12<\u002Ftd><td>hover = fg@3%; selected = accent-soft<\u002Ftd><td>per-column, see above<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Family child<\u002Ftd><td class=\"v\">pad 4 10<\u002Ftd><td>owned tint = ok-bg@26%; selected accent-soft<\u002Ftd><td>tree glyph <span class=\"now\">--t-mono<\u002Fspan> fg3 + LB#<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Member (recording)<\u002Ftd><td class=\"v\">pad 4 10<\u002Ftd><td>surface2@35%<\u002Ftd><td>LB# <span class=\"now\">--t-mono/600<\u002Fspan>; pills trailing<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n\n  <div class=\"note info\">\n    <span class=\"lab\">Hierarchy<\u002Fspan>\n    Show → Family → Member is a three-level disclosure. The edge bar color always reflects the row's coverage tone so the left margin reads as a status ribbon when scanning.\n  <\u002Fdiv>\n\n  <div class=\"ba\">\n    <div class=\"col before\">\n      <h5>Families column — before<\u002Fh5>\n      <ul>\n        <li>Every recording rendered as its own <span class=\"m\">AUD<\u002Fspan> pill<\u002Fli>\n        <li>A 12-recording show became a 4×3 block of identical pills, bleeding the row vertically<\u002Fli>\n        <li>High visual noise, almost no information conveyed<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div class=\"col after\">\n      <h5>Families column — after<\u002Fh5>\n      <ul>\n        <li>One pill per <strong>source family<\u002Fstrong> with an <span class=\"m\">×N<\u002Fspan> count multiplier (<span class=\"m\">SBD ×3 · AUD ×2 · FM<\u002Fspan>)<\u002Fli>\n        <li>Owned families render <span class=\"m\">ok<\u002Fspan> tone, unowned <span class=\"m\">mute<\u002Fspan><\u002Fli>\n        <li>Row height stays compact; the count carries the density that pills used to<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"note fix\">\n    <span class=\"lab\">Column model — no truncation, no mid-table gap<\u002Fspan>\n    The Show column is <strong>not<\u002Fstrong> a greedy flex column (that opened a large void before Tour on wide displays). Every data column has a fixed width sized to its longest content; a single <strong>trailing flex spacer<\u002Fstrong> (auto, after Coverage) absorbs all leftover width at the table's natural end. Result: full venue+title and tour names at any window width, columns packed left, slack parked at the right edge where the table ends. The dead 32px spacer column between Expander and Date was removed.\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════ PAGE 7 · RECORDING TABLE ════════ -->\n<section class=\"page\" data-folio=\"07\" id=\"s6\">\n  <h2><span class=\"sec\">§6<\u002Fspan> Recording table<\u002Fh2>\n  <p class=\"fig-cap\">Reference render — By recording lens with 3 rows selected, bulk action bar floating.<\u002Fp>\n  <div class=\"fig\"><img src=\"c9a72fd1-44ee-4edb-8388-a0d7134a2595\" alt=\"Recording lens with bulk bar\"><\u002Fdiv>\n\n  <h3>Column model<\u002Fh3>\n  <table class=\"spec tight\">\n    <thead><tr><th>#<\u002Fth><th>Column<\u002Fth><th>Width<\u002Fth><th>Content<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td class=\"v\">1<\u002Ftd><td class=\"k\">Edge bar<\u002Ftd><td class=\"v\">3px<\u002Ftd><td>status-tone rail<\u002Ftd><\u002Ftr>\n      <tr><td class=\"v\">2<\u002Ftd><td class=\"k\">Checkbox<\u002Ftd><td class=\"v\">34px<\u002Ftd><td>14px box, <span class=\"m\">accent-color:--lbb-accent-mid<\u002Fspan>; header = select-all (tri-state)<\u002Ftd><\u002Ftr>\n      <tr><td class=\"v\">3<\u002Ftd><td class=\"k\">LB#<\u002Ftd><td class=\"v\">84px<\u002Ftd><td><span class=\"now\">--t-mono / 600<\u002Fspan> · accent-mid<\u002Ftd><\u002Ftr>\n      <tr><td class=\"v\">4<\u002Ftd><td class=\"k\">Status<\u002Ftd><td class=\"v\">72px<\u002Ftd><td>pill: Public=ok · Private=mute · Missing=warn<\u002Ftd><\u002Ftr>\n      <tr><td class=\"v\">5<\u002Ftd><td class=\"k\">Date<\u002Ftd><td class=\"v\">84px<\u002Ftd><td><span class=\"now\">--t-mono<\u002Fspan><\u002Ftd><\u002Ftr>\n      <tr><td class=\"v\">6<\u002Ftd><td class=\"k\">Location<\u002Ftd><td class=\"v\">120px<\u002Ftd><td><span class=\"now\">--t-body<\u002Fspan><\u002Ftd><\u002Ftr>\n      <tr><td class=\"v\">7<\u002Ftd><td class=\"k\">★ Rating<\u002Ftd><td class=\"v\">48px<\u002Ftd><td>rating pill<\u002Ftd><\u002Ftr>\n      <tr><td class=\"v\">8<\u002Ftd><td class=\"k\">Description<\u002Ftd><td class=\"v\">flex (auto)<\u002Ftd><td><span class=\"now\">--t-meta<\u002Fspan> · fg3 — the one greedy column; long descriptions benefit from the leftover width<\u002Ftd><\u002Ftr>\n      <tr><td class=\"v\">9<\u002Ftd><td class=\"k\">Source<\u002Ftd><td class=\"v\">50px<\u002Ftd><td>source badge (SBD/AUD/FM/MTX)<\u002Ftd><\u002Ftr>\n      <tr><td class=\"v\">10<\u002Ftd><td class=\"k\">Own<\u002Ftd><td class=\"v\">44px<\u002Ftd><td>check (ok) / star (warn, wishlist) / cross (bad)<\u002Ftd><\u002Ftr>\n      <tr><td class=\"v\">11<\u002Ftd><td class=\"k\">Flags<\u002Ftd><td class=\"v\">50px<\u002Ftd><td>“dup” (warn) / “xref” (info) pill<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n\n  <h3>Bulk action bar — floating<\u002Fh3>\n  <table class=\"spec tight\">\n    <thead><tr><th>Property<\u002Fth><th>Value<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td class=\"k\">Position<\u002Ftd><td class=\"v\">absolute · bottom 16 · centered (translateX -50%)<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Container<\u002Ftd><td class=\"v\">pad 7 9 7 13 · gap 7 · radius 10 · surface · border2 · shadowLg<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Selection count<\u002Ftd><td class=\"now\">--t-body / 600 · accent-mid<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Buttons<\u002Ftd><td class=\"v\">small (h24); Remove uses bad-fg text + border<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Visibility<\u002Ftd><td class=\"v\">hidden when 0 selected; shows on first check<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n\n  <h3>Scope segmented control <span class=\"muted\" style=\"font-weight:400;font-size:12px\">(recording lens, toolbar)<\u002Fspan><\u002Fh3>\n  <table class=\"spec tight\">\n    <tbody>\n      <tr><td class=\"k\">Everything<\u002Ftd><td class=\"v\">count 9,184<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">My collection<\u002Ftd><td class=\"v\">count 3,582<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Not owned<\u002Ftd><td class=\"v\">count 5,602<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n\n  <div class=\"note fix\">\n    <span class=\"lab\">Bug fixed in passing<\u002Fspan>\n    The ★ column shipped at <span class=\"m\">46px<\u002Fspan>, clipping two-character ratings (<span class=\"m\">A−<\u002Fspan>, <span class=\"m\">B+<\u002Fspan>) to an ellipsis. Widened to <span class=\"m\">56px<\u002Fspan>.\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════ PAGE 8 · PILLS & BADGES ════════ -->\n<section class=\"page\" data-folio=\"08\" id=\"s7\">\n  <h2><span class=\"sec\">§7<\u002Fspan> Pills, badges &amp; chips<\u002Fh2>\n  <p class=\"lead\">All small status objects share one geometry. Only color and the optional leading dot vary. Text is always <span class=\"m\">--t-micro<\u002Fspan> (10px) at weight 600–700.<\u002Fp>\n\n  <h3>Pill — standard<\u002Fh3>\n  <div class=\"tag-row\">\n    <span class=\"pill ok\"><span class=\"dot\"><\u002Fspan>Owned<\u002Fspan>\n    <span class=\"pill warn\">Upgrade<\u002Fspan>\n    <span class=\"pill bad\">Conflict<\u002Fspan>\n    <span class=\"pill info\">Best in family<\u002Fspan>\n    <span class=\"pill mute\">Not owned<\u002Fspan>\n  <\u002Fdiv>\n  <table class=\"spec tight\">\n    <thead><tr><th>Property<\u002Fth><th>Value<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td class=\"k\">Geometry<\u002Ftd><td class=\"v\">pad 1px 7px · gap 5 · radius 999<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Type<\u002Ftd><td class=\"now\">--t-micro / 600 · letter-spacing 0.02em<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Dot (optional)<\u002Ftd><td class=\"v\">6×6 · currentColor · only on “Owned”/live states<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Color<\u002Ftd><td class=\"v\">tone-fg text on tone-bg; never a custom hex<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Weight normalization<\u002Ftd><td class=\"was\">was 650<\u002Ftd><td class=\"now\">→ 600<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n\n  <h3>Source badge — mono code<\u002Fh3>\n  <div class=\"tag-row\">\n    <span class=\"src sbd\">SBD<\u002Fspan><span class=\"src aud\">AUD<\u002Fspan><span class=\"src fm\">FM<\u002Fspan>\n  <\u002Fdiv>\n  <table class=\"spec tight\">\n    <thead><tr><th>Source<\u002Fth><th>Treatment<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td class=\"k\">SBD (soundboard)<\u002Ftd><td>ok-fg text · ok-fg@16% bg · ok-fg@42% border<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">AUD (audience)<\u002Ftd><td>fg2 text · transparent · border2 · opacity .85<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">FM / Pre-FM<\u002Ftd><td>info-fg text · info-fg@16% bg · info-fg@42% border<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">MTX (matrix)<\u002Ftd><td>warn-fg text · warn-fg@16% bg · warn-fg@42% border<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Geometry<\u002Ftd><td class=\"v\">min-w30 · h18 · pad 0 5 · radius 4 · <span class=\"now\">--t-micro/700<\u002Fspan> · tracking 0.3px<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n\n  <h3>Coverage chip <span class=\"muted\" style=\"font-weight:400;font-size:12px\">(performance table, col 10)<\u002Fspan><\u002Fh3>\n  <table class=\"spec tight\">\n    <thead><tr><th>State<\u002Fth><th>Tone<\u002Fth><th>Example label<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td class=\"k\">Complete<\u002Ftd><td>ok (w/ dot)<\u002Ftd><td>Owned · Owned · 2 of 2<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Partial<\u002Ftd><td>warn (w/ up-arrow)<\u002Ftd><td>Upgrade · 2 of 5<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Missing<\u002Ftd><td>mute<\u002Ftd><td>Gap<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Geometry<\u002Ftd><td colspan=\"2\" class=\"v\">pad 1 8 1 6 · gap 5 · radius 999 · <span class=\"now\">--t-micro/600<\u002Fspan> · tabular-nums · 1px tone-bar@50% border<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n\n  <h3>Match chip <span class=\"muted\" style=\"font-weight:400;font-size:12px\">(family card, recordings tab)<\u002Fspan><\u002Fh3>\n  <table class=\"spec tight\">\n    <thead><tr><th>Method<\u002Fth><th>Tone<\u002Fth><th>Label<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td class=\"k\">AI + LB confirmed<\u002Ftd><td>ok<\u002Ftd><td>AI + LB · 98%<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">AI only<\u002Ftd><td>info<\u002Ftd><td>AI · 81%<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">LB metadata only<\u002Ftd><td>mute<\u002Ftd><td>LB<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Geometry<\u002Ftd><td colspan=\"2\" class=\"v\">h18 · pad 1 7 1 5 · radius 4 · 9.5px/700 · 10px leading icon<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n<\u002Fsection>\n\n<!-- ════════ PAGE 9 · PANEL SHELL ════════ -->\n<section class=\"page\" data-folio=\"09\" id=\"s8\">\n  <h2><span class=\"sec\">§8<\u002Fspan> Detail panel — the structural change<\u002Fh2>\n  <p class=\"lead\">This is the substantive redesign. Both detail panels were a <strong>single vertical scroll<\u002Fstrong> stacking every zone. They become a <strong>fixed identity block + tab strip + swappable pane<\u002Fstrong>, so the right box carries Seed&nbsp;&amp;&nbsp;Share and other focus items as first-class tabs rather than items buried below a long scroll.<\u002Fp>\n\n  <div class=\"ba\">\n    <div class=\"col before\">\n      <h5>Before — flat scroll<\u002Fh5>\n      <ul>\n        <li>Header → Identity → ActionBar → Coverage card → Facts → Families → Setlist → Assets → Share/Seed, all stacked<\u002Fli>\n        <li>Seed &amp; Share sat at the very bottom, off-screen on most heights<\u002Fli>\n        <li>No way to jump to a zone; everything competes at once<\u002Fli>\n        <li>Recording panel: same single scroll (file card → catalog note → assets → share)<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div class=\"col after\">\n      <h5>After — tabbed<\u002Fh5>\n      <ul>\n        <li>Identity block stays pinned (date / venue / city / tour)<\u002Fli>\n        <li>Tabs route the body: each focus item is one click<\u002Fli>\n        <li>Seed &amp; Share is a peer tab, not a footer<\u002Fli>\n        <li>Scroll position resets to top on tab change<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <h3>Panel frame<\u002Fh3>\n  <table class=\"spec tight\">\n    <thead><tr><th>Property<\u002Fth><th>Value<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td class=\"k\">Width<\u002Ftd><td class=\"v\">404px · flex 0 0 404 · collapses to 42px<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Border<\u002Ftd><td class=\"v\">1px --lbb-border left · surface bg<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Header row<\u002Ftd><td class=\"v\">pad 10 10 10 16 · eyebrow <span class=\"now\">--t-label/700<\u002Fspan> + “LB page” button + collapse chevron<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Identity block<\u002Ftd><td class=\"v\">pad 14 16 12 · 1px border bottom · pinned (does not scroll)<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Tab strip<\u002Ftd><td class=\"v\">pad 6 10 0 · gap 2 · 1px border bottom<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Pane body<\u002Ftd><td class=\"v\">flex 1 · overflow-y auto · pad 16<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n\n  <h3>Identity block typography<\u002Fh3>\n  <table class=\"spec tight\">\n    <thead><tr><th>Line<\u002Fth><th>Type<\u002Fth><th>Was<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td class=\"k\">DOW eyebrow / status pills<\u002Ftd><td class=\"now\">--t-meta / --t-micro<\u002Ftd><td class=\"was\">9.5 / 11<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Show date (perf) / LB# (rec)<\u002Ftd><td class=\"now\">--t-display / 700<\u002Ftd><td class=\"was\">16 · 700<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Venue / location<\u002Ftd><td class=\"now\">--t-title / 600<\u002Ftd><td class=\"was\">12.5 · 700<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">City<\u002Ftd><td class=\"now\">--t-body<\u002Ftd><td class=\"was\">12<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Tour (w/ route icon)<\u002Ftd><td class=\"now\">--t-meta / fg3<\u002Ftd><td class=\"was\">11.5<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n\n  <h3>Tab control<\u002Fh3>\n  <table class=\"spec tight\">\n    <thead><tr><th>Property<\u002Fth><th>Value<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td class=\"k\">Tab (idle)<\u002Ftd><td class=\"v\">pad 7 11 9 · <span class=\"now\">--t-body/500<\u002Fspan> · fg3<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Tab (active)<\u002Ftd><td class=\"v\"><span class=\"now\">--t-body/600<\u002Fspan> · accent-mid · 2px accent underline (inset 8px, bottom -1)<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Tab count pill<\u002Ftd><td class=\"v\">min-w16 · h16 · radius 8 · 9px/700; idle surface3/fg3, active accent-mid/white<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Hover (idle)<\u002Ftd><td class=\"v\">fg3 → fg2<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n<\u002Fsection>\n\n<!-- ════════ PAGE 10 · PERFORMANCE PANEL TABS ════════ -->\n<section class=\"page\" data-folio=\"10\" id=\"s9\">\n  <h2><span class=\"sec\">§9<\u002Fspan> Performance panel — four tabs<\u002Fh2>\n  <div class=\"spec-grid\">\n    <div>\n      <p class=\"fig-cap\">Recordings tab — TapeMatch family cards.<\u002Fp>\n      <div class=\"fig\"><img src=\"f5676a20-0403-4c60-b185-0ff701a68822\" alt=\"Performance recordings tab\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <p class=\"fig-cap\">Seed &amp; Share tab.<\u002Fp>\n      <div class=\"fig\"><img src=\"bca99f93-2571-4137-b70a-60e3580e408b\" alt=\"Performance share tab\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <table class=\"spec tight\">\n    <thead><tr><th>Tab<\u002Fth><th>Count<\u002Fth><th>Contents<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td class=\"k\">Overview<\u002Ftd><td>—<\u002Ftd><td>Action bar (Play best · Reveal · More) → coverage card (owned-of-total, best grade pill, segmented meter, 2 notes) → 3 fact tiles (Families / Setlist / Length) → Assets chips<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Recordings<\u002Ftd><td class=\"v\">5<\u002Ftd><td>TapeMatch family cards; each: source badge + name + match chip + upload count, then member rows (best = accent-soft tint, glyph ●; others glyph └)<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Setlist<\u002Ftd><td>—<\u002Ftd><td>21-track list; <span class=\"now\">--t-meta<\u002Fspan> rows, mono track number, zebra at surface2@40%<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Seed &amp; Share<\u002Ftd><td>—<\u002Ftd><td>seeding status dot + line → 2 stat boxes (active seeds / peers) → 3 actions → filterable activity log → Assets<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n\n  <h3>Coverage card (Overview)<\u002Fh3>\n  <table class=\"spec tight\">\n    <tbody>\n      <tr><td class=\"k\">Container<\u002Ftd><td class=\"v\">pad 11 12 · radius 8 · surface2 · 1px border<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Title<\u002Ftd><td class=\"now\">--t-strong / 600 · no-wrap<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Right meta<\u002Ftd><td class=\"now\">--t-meta · grade as ok pill<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Meter<\u002Ftd><td class=\"v\">gap 3 · 6px high bars; full = ok-bar, empty = surface2 + border2; flex-weighted<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Notes<\u002Ftd><td class=\"now\">--t-meta · dim or warn · 12px leading icon<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n\n  <h3>Fact tile<\u002Fh3>\n  <table class=\"spec tight\">\n    <tbody>\n      <tr><td class=\"k\">Grid<\u002Ftd><td class=\"v\">3 columns · gap 8<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Value<\u002Ftd><td class=\"v\">18px / 700 · tabular · unit suffix <span class=\"now\">--t-micro<\u002Fspan> fg3<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Label<\u002Ftd><td class=\"v\">9.5px / 600 uppercase · tracking 0.06em · fg3<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n\n  <div class=\"note info\">\n    <span class=\"lab\">Family card — owned variant<\u002Fspan>\n    When the viewer owns a member, the card border becomes <span class=\"m\">accent-mid@38%<\u002Fspan> and background <span class=\"m\">--lbb-surface2<\u002Fspan>; the best member row gets an <span class=\"m\">accent-soft@60%<\u002Fspan> wash. Otherwise neutral border, white surface.\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════ PAGE 11 · RECORDING PANEL TABS ════════ -->\n<section class=\"page\" data-folio=\"11\" id=\"s10\">\n  <h2><span class=\"sec\">§10<\u002Fspan> Recording panel — three tabs<\u002Fh2>\n  <p class=\"fig-cap\">Recording detail — Overview tab. Identity shows LB#, ownership pills, source + rating.<\u002Fp>\n  <div class=\"fig\"><img src=\"129c51ad-fd9f-425d-b138-5a66e40228c4\" alt=\"Recording detail panel\"><\u002Fdiv>\n\n  <table class=\"spec tight\">\n    <thead><tr><th>Tab<\u002Fth><th>Count<\u002Fth><th>Contents<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td class=\"k\">Overview<\u002Ftd><td>—<\u002Ftd><td>Action bar (Play · Reveal · More) → File &amp; location card (folder / path / format / confirmed / checksums as key–value) → context note (best-in-family, links to show) → 3 fact tiles (Rating / Tracks / Sets)<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Assets<\u002Ftd><td class=\"v\">3<\u002Ftd><td>Three full-width asset rows: Attachments (ok), Spectrograms (warn 2/3), Location on map (info) — each with 30px icon tile, title, sub-line, trailing pill<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Seed &amp; Share<\u002Ftd><td>—<\u002Ftd><td>Identical structure to the performance Seed&nbsp;&amp;&nbsp;Share tab, scoped to this single recording<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n\n  <h3>Identity block — recording variant<\u002Fh3>\n  <table class=\"spec tight\">\n    <tbody>\n      <tr><td class=\"k\">Ownership pills<\u002Ftd><td class=\"v\">Owned (ok+dot) · Public (ok) · “in 5-family show” (info)<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">LB#<\u002Ftd><td class=\"now\">--t-display / 700 · mono · accent-mid<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Context line<\u002Ftd><td class=\"now\">--t-body · date · venue · city<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Source line<\u002Ftd><td class=\"v\">source badge + descriptor + rating pill · <span class=\"now\">--t-meta<\u002Fspan><\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n\n  <h3>File &amp; location card — key/value<\u002Fh3>\n  <table class=\"spec tight\">\n    <tbody>\n      <tr><td class=\"k\">Grid<\u002Ftd><td class=\"v\">80px / 1fr · gap 6 10<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Key<\u002Ftd><td class=\"now\">--t-meta · fg3<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Value<\u002Ftd><td class=\"now\">--t-mono-sm · fg2 (or sans for human strings)<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Rows<\u002Ftd><td class=\"v\">Folder · Path · Format · Confirmed · Checksums<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n\n  <h3>Asset row<\u002Fh3>\n  <table class=\"spec tight\">\n    <tbody>\n      <tr><td class=\"k\">Container<\u002Ftd><td class=\"v\">pad 11 12 · gap 11 · radius 8 · surface2 · 1px border; hover border2<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Icon tile<\u002Ftd><td class=\"v\">30×30 · radius 8 · surface · 1px border · fg2 icon<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Title / sub<\u002Ftd><td class=\"now\">--t-strong/600 · --t-meta/fg3<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Trailing<\u002Ftd><td class=\"v\">state pill (ok count / warn ratio / info “View”)<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n\n  <div class=\"note info\">\n    <span class=\"lab\">Unowned state — to build<\u002Fspan>\n    For a not-owned recording the Overview file card is replaced by a wishlist CTA and the Assets/Seed tabs are suppressed (nothing local to act on). This state is specced but not yet in the reference build.\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════ PAGE 12 · INTERACTIONS ════════ -->\n<section class=\"page\" data-folio=\"12\" id=\"s11\">\n  <h2><span class=\"sec\">§11<\u002Fspan> Interactions &amp; behavior<\u002Fh2>\n\n  <h3>Lens switching<\u002Fh3>\n  <ul class=\"clean\">\n    <li>The <strong>By performance / By recording<\u002Fstrong> segmented control swaps the entire screen body (toolbar, filters, summary, table, panel). Each lens owns its own toolbar — the recording lens adds the scope control and a Columns button.<\u002Fli>\n    <li>State is independent per lens; switching does not reset the other lens's selection or filters.<\u002Fli>\n  <\u002Ful>\n\n  <h3>Detail panel<\u002Fh3>\n  <ul class=\"clean\">\n    <li>Tabs are panel-scoped — clicking a tab toggles <span class=\"m\">.on<\u002Fspan> on the tab and its matching pane only within that panel.<\u002Fli>\n    <li>On tab change the pane body scrolls to top (<span class=\"m\">scrollTop = 0<\u002Fspan>).<\u002Fli>\n    <li>The collapse chevron toggles the panel to a 42px rail; identity, tabs, and body hide; the eyebrow and “LB page” button hide; only the expand control remains.<\u002Fli>\n    <li>The identity block never scrolls — it is a fixed sibling above the scrolling pane.<\u002Fli>\n  <\u002Ful>\n\n  <h3>Selection (recording lens)<\u002Fh3>\n  <ul class=\"clean\">\n    <li>Row click selects the row for the detail panel; clicking the checkbox does <em>not<\u002Fem> select-for-detail (event guarded).<\u002Fli>\n    <li>Checkboxes drive the floating bulk bar. The header checkbox is tri-state: checked when all rows checked, indeterminate when some.<\u002Fli>\n    <li>Bulk bar appears only when ≥1 row is checked; “Clear” unchecks all and hides it.<\u002Fli>\n  <\u002Ful>\n\n  <h3>Activity log filter<\u002Fh3>\n  <ul class=\"clean\">\n    <li>Three segmented chips: All / Torrents / Forum. Filtering is per-panel and re-renders the log list in place.<\u002Fli>\n    <li>Empty result shows the “Not shared yet.” line, never a fabricated entry.<\u002Fli>\n  <\u002Ful>\n\n  <h3>Motion<\u002Fh3>\n  <table class=\"spec tight\">\n    <thead><tr><th>Transition<\u002Fth><th>Duration / curve<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td class=\"k\">Button / pill hover (bg, border)<\u002Ftd><td class=\"v\">120ms ease<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Tab active underline<\u002Ftd><td class=\"v\">instant (no slide)<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Row hover wash<\u002Ftd><td class=\"v\">instant<\u002Ftd><\u002Ftr>\n      <tr><td class=\"k\">Panel collapse<\u002Ftd><td class=\"v\">width snap (no animated reflow)<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n\n  <div class=\"note info\">\n    <span class=\"lab\">Accessibility floors<\u002Fspan>\n    No interactive text below 10px. Hit targets: filter pills h28, buttons h30, tabs ≥28px tall, checkbox 14px within a 34px cell. Focus ring is <span class=\"m\">--lbb-focusRing<\u002Fspan> (dark: <span class=\"m\">3px rgba(123,141,242,.30)<\u002Fspan>).\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════ PAGE 13 · FILE MAP ════════ -->\n<section class=\"page\" data-folio=\"13\" id=\"s12\">\n  <h2><span class=\"sec\">§12<\u002Fspan> Implementation — file-by-file<\u002Fh2>\n  <p class=\"lead\">Where each change lands in the repo. No new files; no token, route, or API changes.<\u002Fp>\n\n  <table class=\"spec\">\n    <thead><tr><th>File<\u002Fth><th>Change<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr>\n        <td class=\"k\">lib/tokens.ts<\u002Ftd>\n        <td>Add the nine <span class=\"m\">--t-*<\u002Fspan> role variables and <span class=\"m\">--track-eyebrow<\u002Fspan> to the root style application (alongside the existing <span class=\"m\">--lbb-fs-*<\u002Fspan> loop, which stays for other screens). No values removed.<\u002Ftd>\n      <\u002Ftr>\n      <tr>\n        <td class=\"k\">screens/ScreenLibrary.tsx<\u002Ftd>\n        <td>Replace every inline <span class=\"m\">fontSize<\u002Fspan> (raw px and <span class=\"m\">--lbb-fs-*<\u002Fspan>) and <span class=\"m\">fontWeight<\u002Fspan> with the role variables per §2's binding table. Fix summary strip to <span class=\"m\">height:40 · nowrap<\u002Fspan> (§4). <strong>Collapse the Families column<\u002Fstrong> to one pill-per-source-family with an <span class=\"m\">×N<\u002Fspan> count instead of one pill per recording (§5). <strong>Rework the performance column model<\u002Fstrong>: drop the dead 32px spacer, give every data column a fixed width sized to its longest content (Show 345 · Tour 155 · …), add a trailing flex spacer to absorb leftover (§5). Recording lens: Description stays the single flex column; ★ column 46→48px.<\u002Ftd>\n      <\u002Ftr>\n      <tr>\n        <td class=\"k\">components/library/DetailPanel.tsx<\u002Ftd>\n        <td>The structural work. Introduce a tab state + tab strip below the pinned identity block. Move existing zones into panes: <em>performance<\u002Fem> → Overview / Recordings / Setlist / Seed&nbsp;&amp;&nbsp;Share; <em>recording<\u002Fem> → Overview / Assets / Seed&nbsp;&amp;&nbsp;Share. Reuse the existing <span class=\"m\">ActionBarZone<\u002Fspan>, <span class=\"m\">ShareSeedZone<\u002Fspan>, <span class=\"m\">AssetStripZone<\u002Fspan>, family/setlist renderers — they are repositioned, not rewritten. Apply role variables to all zone labels and card text.<\u002Ftd>\n      <\u002Ftr>\n      <tr>\n        <td class=\"k\">components/primitives.tsx<\u002Ftd>\n        <td>Normalize the <span class=\"m\">Pill<\u002Fspan> default from <span class=\"m\">650<\u002Fspan>→<span class=\"m\">600<\u002Fspan> and badge weights <span class=\"m\">800<\u002Fspan>→<span class=\"m\">700<\u002Fspan> so the change is centralized rather than per-call-site.<\u002Ftd>\n      <\u002Ftr>\n      <tr>\n        <td class=\"k\">components/table.tsx<\u002Ftd>\n        <td>No change required; column widths are passed by the screen. (If header label weight is hard-coded, route it to <span class=\"m\">--t-label<\u002Fspan>.)<\u002Ftd>\n      <\u002Ftr>\n      <tr>\n        <td class=\"k\">lib/tokens.ts · theme<\u002Ftd>\n        <td>No value changes. Confirm the screen renders correctly under the production resolution (<span class=\"m\">mode:dark · palette:slate · accent:indigo<\u002Fspan>) — the reference build and §3 are authored against it. All color must come from the <span class=\"m\">--lbb-*<\u002Fspan> variables so the light toggle continues to work.<\u002Ftd>\n      <\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n\n  <h3>Acceptance checklist<\u002Fh3>\n  <ul class=\"clean\">\n    <li>Grep <span class=\"m\">ScreenLibrary.tsx<\u002Fspan> + <span class=\"m\">DetailPanel.tsx<\u002Fspan> for <span class=\"m\">fontSize<\u002Fspan> / <span class=\"m\">fontWeight<\u002Fspan> → zero raw numeric literals remain; all reference <span class=\"m\">--t-*<\u002Fspan> / <span class=\"m\">--w-*<\u002Fspan>.<\u002Fli>\n    <li>Both detail panels show a tab strip; Seed&nbsp;&amp;&nbsp;Share is reachable in one click from a selected row.<\u002Fli>\n    <li>Families column shows collapsed <span class=\"m\">SRC ×N<\u002Fspan> pills, never one pill per recording.<\u002Fli>\n    <li>Performance table: Show venue+title and Tour names never truncate at ≥1280px wide; no gap between Show and Tour; leftover sits at the trailing edge.<\u002Fli>\n    <li>Summary strip never wraps; ratings never ellipsize; Seed&nbsp;&amp;&nbsp;Share shows the “Not shared yet” line once (the old panel printed it twice).<\u002Fli>\n    <li>Collapse → 42px rail and back works on both lenses.<\u002Fli>\n    <li>Bulk bar tri-state + filterable log behave per §11.<\u002Fli>\n    <li>Renders correctly in dark (slate+indigo, primary) and light; visual-diff against <span class=\"m\">Unified Library (refined).html<\u002Fspan> at 1440×900 and at ≥1880 wide, default density.<\u002Fli>\n  <\u002Ful>\n\n  <div class=\"note fix\" style=\"margin-top:24px\">\n    <span class=\"lab\">Reference build<\u002Fspan>\n    Every measurement in this document is realized in <span class=\"m\">Unified Library (refined).html<\u002Fspan>. When a value here and the reference disagree, the reference build is the source of truth — it is the artifact this spec describes.\n  <\u002Fdiv>\n<\u002Fsection>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
