<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LosslessBob — Data Purges: Before / After</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#b03f30"/>
    <rect x="28" y="33" width="30" height="7" rx="2" fill="#fff"/>
    <rect x="28" y="46" width="44" height="7" rx="2" fill="#fff" opacity="0.7"/>
    <rect x="28" y="59" width="22" height="7" rx="2" fill="#fff" opacity="0.45"/>
  </svg>
</template>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: "IBM Plex Sans", system-ui, sans-serif;
    background: #f4f2ee;
    color: #1c1a17;
  }
  .mono { font-family: "IBM Plex Mono", monospace; font-variant-numeric: tabular-nums; }

  /* artboard backdrop — warm cream, card centered */
  .stage { height: 100%; background: #faf8f3; display: flex; align-items: center; justify-content: center; padding: 40px; }

  /* ===== shared card shell ===== */
  .card { width: 600px; background: #ffffff; border: 1px solid #e2dfd2; border-radius: 12px; }

  /* ====================== BEFORE ====================== */
  .bf { padding: 22px 24px; }
  .bf-title { margin: 0 0 18px; font-size: 12px; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase; color: #1c1a17; }
  .bf-grid { display: grid; grid-template-columns: 1fr auto; row-gap: 21px; column-gap: 14px; align-items: center; font-size: 13.5px; }
  .bf-label { color: #2a2723; }
  .bf-count { color: #b3aea4; font-size: 12px; margin-left: 8px; }
  .bf-purge { justify-self: end; font-weight: 700; color: #2a2723; font-size: 13px; }
  .bf-note { margin-top: 22px; font-size: 12px; color: #9a958c; }

  /* ====================== AFTER ====================== */
  .af { padding: 20px 22px 18px; }
  .af-head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 4px; }
  .af-title { margin: 0; font-size: 12px; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase; color: #1c1a17; }
  .af-sub { font-size: 12px; color: #9a958c; }
  .af-free { margin-left: auto; font-size: 11.5px; color: #8e8676; }
  .af-free b { color: #5b554a; font-weight: 600; }

  .af-list { margin-top: 14px; display: flex; flex-direction: column; }
  .af-row {
    display: grid;
    grid-template-columns: 9px minmax(160px, 1fr) 150px auto;
    align-items: center; column-gap: 16px;
    padding: 11px 8px; border-radius: 8px;
    border-bottom: 1px solid #f1efe7;
    transition: background .12s;
  }
  .af-row:last-of-type { border-bottom: none; }
  .af-row:hover { background: #faf8f3; }
  .af-dot { width: 7px; height: 7px; border-radius: 2px; background: #cfc9bb; }
  .af-name { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .af-name b { font-size: 13px; font-weight: 600; color: #1c1a17; }
  .af-name span { font-size: 11.5px; color: #9a958c; }

  .af-metric { display: flex; flex-direction: column; gap: 5px; }
  .af-metric .num { font-size: 13px; font-weight: 600; color: #2a2723; }
  .af-metric .num em { font-style: normal; color: #b3aea4; font-weight: 500; font-size: 11px; margin-left: 4px; }
  .af-bar { height: 4px; border-radius: 2px; background: #ece9e1; overflow: hidden; }
  .af-bar i { display: block; height: 100%; border-radius: 2px; background: #c8c3b1; }

  /* ghost purge button — reveals destructive intent on hover */
  .af-btn {
    justify-self: end; font-family: inherit; cursor: pointer;
    border: 1px solid #e2dfd2; background: #fff; color: #5b554a;
    font-size: 12px; font-weight: 500; padding: 6px 13px; border-radius: 7px;
    transition: all .12s;
  }
  .af-btn:hover { border-color: #e3a99b; background: #fbe6df; color: #b03f30; }

  /* danger zone — the nuke, separated and weighted */
  .af-danger {
    margin-top: 14px; padding: 14px 14px 14px 16px;
    border: 1px solid #efd6cd; border-radius: 10px;
    background: #fdf1ec;
    display: grid; grid-template-columns: 4px 1fr auto; align-items: center; column-gap: 14px;
  }
  .af-danger-rail { width: 4px; align-self: stretch; border-radius: 2px; background: #d8604f; }
  .af-danger-txt b { font-size: 13px; font-weight: 700; color: #8f3526; }
  .af-danger-txt span { display: block; font-size: 11.5px; color: #a86b5e; margin-top: 2px; }
  .af-danger-txt span .mono { color: #8f3526; font-weight: 600; }
  .af-btn-danger {
    font-family: inherit; cursor: pointer;
    border: 1px solid #d8604f; background: #fff; color: #b03f30;
    font-size: 12px; font-weight: 600; padding: 7px 15px; border-radius: 7px;
    transition: all .12s;
  }
  .af-btn-danger:hover { background: #b03f30; color: #fff; border-color: #b03f30; }

  /* protected-archive callout */
  .af-protect {
    margin-top: 14px; display: flex; align-items: center; gap: 9px;
    font-size: 11.5px; color: #5b554a;
    padding-top: 13px; border-top: 1px solid #f1efe7;
  }
  .af-protect .shield { flex: 0 0 auto; width: 8px; height: 8px; border-radius: 50%; background: #39a360; }
  .af-protect b { color: #1f7a3e; font-weight: 600; }

  /* ===== notes ===== */
  .note { font-size: 13px; line-height: 1.55; color: #4a463f; }
  .note h4 { margin: 0 0 10px; font-size: 12px; letter-spacing: .04em; text-transform: uppercase; color: #8a857c; }
  .note ul { margin: 0; padding-left: 18px; columns: 2; column-gap: 44px; }
  .note li { margin: 0 0 9px; break-inside: avoid; }
  .note li b { color: #1c1a17; }
  .swatch { display: inline-block; width: 9px; height: 9px; border-radius: 2px; vertical-align: middle; margin: 0 2px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard } = window;

  // ---- shared data ---------------------------------------------------
  const SCOPES = [
    { name: "Lookup history",   desc: "Recent lookup queries",        count: 3,       unit: "queries", bar: 9  },
    { name: "Import log",       desc: "Flat-file import audit lines",  count: 8158,    unit: "lines",   bar: 78 },
    { name: "Scraper cache",    desc: "Cached detail-page HTML",       count: 110964,  unit: "pages",   bar: 100 },
    { name: "Fingerprint cache",desc: "Audio fingerprint blobs",       count: 576,     unit: "blobs",   bar: 55 },
  ];
  const fmt = n => n.toLocaleString("en-US");

  // ---- BEFORE (faithful to the current build) ------------------------
  function BeforeCard() {
    const rows = [...SCOPES, { name: "All user data", count: 198557 }];
    return (
      <div className="stage">
        <div className="card">
          <div className="bf">
            <h4 className="bf-title">Data purges</h4>
            <div className="bf-grid">
              {rows.map(r => (
                <React.Fragment key={r.name}>
                  <div>
                    <span className="bf-label">{r.name}</span>
                    <span className="bf-count mono">{fmt(r.count)}</span>
                  </div>
                  <div className="bf-purge">Purge…</div>
                </React.Fragment>
              ))}
            </div>
            <div className="bf-note">User data only. The checksum archive is never affected.</div>
          </div>
        </div>
      </div>
    );
  }

  // ---- AFTER ---------------------------------------------------------
  function AfterCard() {
    return (
      <div className="stage">
        <div className="card">
          <div className="af">
            <div className="af-head">
              <h4 className="af-title">Data purges</h4>
              <span className="af-sub">reclaim local storage</span>
              <span className="af-free"><b>≈ 1.4 GB</b> recoverable</span>
            </div>

            <div className="af-list">
              {SCOPES.map(r => (
                <div className="af-row" key={r.name}>
                  <span className="af-dot" />
                  <span className="af-name">
                    <b>{r.name}</b>
                    <span>{r.desc}</span>
                  </span>
                  <span className="af-metric">
                    <span className="num mono">{fmt(r.count)}<em>{r.unit}</em></span>
                    <span className="af-bar"><i style={{ width: r.bar + "%" }} /></span>
                  </span>
                  <button className="af-btn">Purge</button>
                </div>
              ))}
            </div>

            <div className="af-danger">
              <span className="af-danger-rail" />
              <span className="af-danger-txt">
                <b>Purge all user data</b>
                <span>Collection, wishlist, ratings, alerts &amp; logs — <span className="mono">198,557</span> records, not reversible.</span>
              </span>
              <button className="af-btn-danger">Purge all…</button>
            </div>

            <div className="af-protect">
              <span className="shield" />
              <span>The <b>checksum archive</b> — <span className="mono">704,624</span> hashes — is never touched by any purge.</span>
            </div>
          </div>
        </div>
      </div>
    );
  }

  function App() {
    return (
      <DesignCanvas>
        <DCSection id="purges" title="Data purges card" subtitle="Same scopes — recut for hierarchy, risk & recoverable-space signal">
          <DCArtboard id="before" label="Before · current build" width={760} height={560}>
            <BeforeCard />
          </DCArtboard>
          <DCArtboard id="after" label="After · weighted rows + isolated danger zone" width={760} height={560}>
            <AfterCard />
          </DCArtboard>
        </DCSection>

        <DCSection id="notes" title="What changed" subtitle="">
          <DCArtboard id="changelog" label="Notes" width={1540} height={300}>
            <div style={{ padding: "26px 30px", background: "#fff", height: "100%" }}>
              <div className="note">
                <h4>The five moves</h4>
                <ul>
                  <li><b>Broke the flat list into real rows.</b> Each scope now carries a one-line descriptor, so you know what you're deleting without guessing from the label alone.</li>
                  <li><b>Counts became a metric, not a footnote.</b> The number gets weight, a dimmed unit (<span className="mono" style={{color:"#b3aea4"}}>pages / blobs / lines</span>), and a quiet magnitude bar — you can see at a glance that Scraper cache dwarfs everything else.</li>
                  <li><b>"Purge…" became a button.</b> It now has a real outline affordance and only turns <span className="swatch" style={{background:"#d8604f"}}></span><b style={{color:"#b03f30"}}>red on hover</b> — destructive intent is revealed at the moment of action, not shouted on every row.</li>
                  <li><b>Isolated the nuke.</b> "All user data" wiped out everything yet looked as safe as deleting 3 lookup rows. It's now pulled into its own <b>danger zone</b> — red rail, framed, "not reversible" — so the catastrophic action can't be mistaken for a routine one.</li>
                  <li><b>Upgraded the reassurance line.</b> The protected archive gets a <span className="swatch" style={{background:"#39a360", borderRadius:"50%"}}></span> green safe-marker and a concrete count (704,624 hashes), turning fine print into a trust signal. A <b>recoverable-space</b> readout up top answers "why would I purge?"</li>
                </ul>
              </div>
            </div>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
