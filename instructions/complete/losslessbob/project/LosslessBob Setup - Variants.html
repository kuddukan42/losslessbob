<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>LosslessBob Setup — variants</title>
<style>
  html, body { margin: 0; height: 100%; background: #f5f5f4; font-family: -apple-system, "Segoe UI", Inter, system-ui, sans-serif; }
  #root { height: 100%; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="setup-original.jsx"></script>
<script type="text/babel" src="setup-sidebar.jsx"></script>
<script type="text/babel" src="setup-dashboard.jsx"></script>
<script type="text/babel" src="setup-overview.jsx"></script>
<script type="text/babel" src="setup-hybrid.jsx"></script>

<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard } = window;

  function App() {
    return (
      <DesignCanvas title="LosslessBob — Setup tab">
        <DCSection id="baseline" title="Baseline (as-is)">
          <DCArtboard id="setup-original" label="Original — everything on one tab" width={1920} height={1080}>
            <window.SetupOriginalUI />
          </DCArtboard>
        </DCSection>
        <DCSection id="explorations" title="Layout explorations">
          <DCArtboard id="setup-sidebar" label="A · Sidebar nav (focused sub-pages)" width={1920} height={1080}>
            <window.SetupSidebarUI />
          </DCArtboard>
          <DCArtboard id="setup-dashboard" label="B · Two-column dashboard (config + live state)" width={1920} height={1080}>
            <window.SetupDashboardUI />
          </DCArtboard>
        </DCSection>
        <DCSection id="hybrids" title="Hybrids — tabs + status">
          <DCArtboard id="setup-overview" label="C · Sidebar nav + Overview as first page" width={1920} height={1080}>
            <window.SetupOverviewUI />
          </DCArtboard>
          <DCArtboard id="setup-hybrid" label="D · Sidebar + persistent contextual right column" width={1920} height={1080}>
            <window.SetupHybridUI />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
