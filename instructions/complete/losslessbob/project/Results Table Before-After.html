<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LosslessBob — Results Table: Before / After</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#6b47d6"/>
    <rect x="30" y="34" width="40" height="7" rx="2" fill="#fff"/>
    <rect x="30" y="47" width="40" height="7" rx="2" fill="#fff" opacity="0.7"/>
    <rect x="30" y="60" width="40" height="7" rx="2" fill="#fff" opacity="0.45"/>
  </svg>
</template>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: "IBM Plex Sans", system-ui, sans-serif;
    background: #f4f2ee;
    color: #2a2723;
  }

  /* shared table primitives -------------------------------------------- */
  .mono { font-family: "IBM Plex Mono", monospace; font-variant-numeric: tabular-nums; }

  /* ====================== BEFORE ====================== */
  .bf-wrap { background: #fff; height: 100%; display: flex; flex-direction: column; font-size: 13px; }
  .bf-toolbar { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid #ece9e3; }
  .bf-tb-search { flex: 1; background: #f6f5f2; border: 1px solid #e8e5df; border-radius: 7px; padding: 8px 12px; color: #9a958c; }
  .bf-tb-ctrl { border: 1px solid #e8e5df; border-radius: 7px; padding: 7px 11px; color: #4a463f; white-space: nowrap; }
  .bf-purple { color: #6b47d6; background: #f1edfb; border-color: #ddd2f6; }
  .bf-meta { display: flex; align-items: center; gap: 10px; padding: 9px 16px; font-size: 12.5px; }
  .bf-dim { color: #9a958c; }
  .bf-chip { background: #f1eff9; color: #5c5570; border: 1px solid #e6e2f2; border-radius: 5px; padding: 3px 8px; font-size: 11.5px; }
  .bf-sort { margin-left: auto; color: #8a857c; }

  /* the green wash + green rail being critiqued */
  .bf-table { flex: 1; overflow: hidden; border-left: 4px solid #5aa06f; background: #f0f6f0; }
  .bf-head, .bf-row { display: grid; grid-template-columns: 92px 64px 80px 180px 40px 1fr 56px 60px; align-items: center; column-gap: 12px; padding: 0 16px; }
  .bf-head { height: 34px; font-size: 11px; letter-spacing: .04em; color: #8a857c; border-bottom: 1px solid #dfe9df; background: #eaf3ea; }
  .bf-grouprow { padding: 7px 16px; font-size: 12.5px; color: #6a665e; background: #e6f0e6; font-weight: 600; }
  .bf-row { height: 39px; border-bottom: 1px solid #e3ede3; font-size: 13px; }
  .bf-public { color: #3f8f5e; font-weight: 600; font-size: 12px; }
  .bf-badge { font-family: "IBM Plex Mono", monospace; font-weight: 600; }
  .c-lb { font-size: 12.5px; }
  .c-loc, .c-desc { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .c-desc { color: #4a463f; }
  .c-own { color: #5aa06f; white-space: nowrap; }
  .c-xref { color: #8a857c; }

  /* ====================== AFTER ====================== */
  .af-wrap { background: #fcfbf9; height: 100%; display: flex; flex-direction: column; font-size: 13px; }
  .af-toolbar { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid #ece9e3; }
  .af-tb-search { flex: 1; background: #f5f3f0; border: 1px solid #e8e5df; border-radius: 7px; padding: 8px 12px; color: #9a958c; }
  .af-tb-ctrl { border: 1px solid #e8e5df; border-radius: 7px; padding: 7px 11px; color: #4a463f; white-space: nowrap; }
  .af-active { color: #6b47d6; border-color: #d8ccf4; box-shadow: inset 0 0 0 1px #d8ccf4; font-weight: 500; }
  .af-meta { display: flex; align-items: center; gap: 8px; padding: 9px 16px; font-size: 12.5px; }
  .af-dim { color: #a6a199; }
  .af-chip { display: inline-flex; align-items: center; gap: 6px; background: #f3f1ec; color: #5a554c; border: 1px solid #e6e2da; border-radius: 999px; padding: 3px 6px 3px 10px; font-size: 11.5px; }
  .af-chip em { font-style: normal; color: #b3ada3; cursor: pointer; }
  .af-sort { margin-left: auto; color: #a6a199; }
  .af-sort b { color: #4a463f; font-weight: 500; }

  /* neutral table — no wash, no rail */
  .af-table { flex: 1; overflow: hidden; }
  .af-head, .af-row { display: grid; grid-template-columns: 16px 92px 80px 188px 60px minmax(0,1fr) 64px 64px; align-items: center; column-gap: 14px; padding: 0 18px; }
  .af-head { height: 34px; font-size: 10.5px; letter-spacing: .06em; color: #a6a199; border-bottom: 1px solid #ece9e3; position: sticky; top: 0; background: #fcfbf9; }
  .af-grouprow { padding: 9px 18px 7px; font-size: 12px; letter-spacing: .02em; color: #8a857c; font-weight: 600; background: #f7f5f1; border-bottom: 1px solid #efece6; position: sticky; top: 34px; }
  .af-caret { color: #c2bcb1; }
  .af-gcount { color: #b3ada3; font-weight: 500; margin-left: 2px; }
  .af-row { height: 40px; border-bottom: 1px solid #f1eee9; }
  .af-row:hover { background: #f7f5f1; }

  .af-status-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #d9d5cd; } /* near-invisible for the constant 'Public' */
  .af-badge { font-family: "IBM Plex Mono", monospace; font-weight: 600; font-size: 11px; border: 1px solid; border-radius: 5px; padding: 1px 5px; min-width: 22px; display: inline-block; text-align: center; }
  .af-dash { color: #cfcabf; }
  .c-lb { font-size: 12.5px; color: #2a2723; }
  .af-row .c-loc { color: #4a463f; }
  .c-loc, .c-desc { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .af-desc { color: #b0aaa0; } /* remainder dimmed by default */
  .af-lead { color: #46423b; }
  .af-rest { color: #b0aaa0; }
  .af-grade { font-family: "IBM Plex Mono", monospace; font-size: 10.5px; font-weight: 600; color: #6a665e; background: #f0ede7; border-radius: 4px; padding: 1px 5px; margin-right: 8px; }
  .af-xref-link { color: #6b47d6; cursor: pointer; }
  .af-check { color: #2f9d63; font-weight: 700; }
  .c-date { color: #6a665e; font-size: 12.5px; }

  /* annotation callouts under each artboard */
  .note { font-size: 13px; line-height: 1.5; color: #4a463f; max-width: 1400px; }
  .note h4 { margin: 0 0 8px; font-size: 13px; letter-spacing: .02em; text-transform: uppercase; color: #8a857c; }
  .note ul { margin: 0; padding-left: 18px; }
  .note li { margin: 3px 0; }
  .note li b { color: #2a2723; }
  .swatch { display: inline-block; width: 9px; height: 9px; border-radius: 2px; vertical-align: middle; margin-right: 4px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="table.jsx"></script>
<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard } = window;

  function App() {
    return (
      <DesignCanvas>
        <DCSection id="results" title="Results table" subtitle="Same data, same columns — recoloured for signal">
          <DCArtboard id="before" label="Before · current build" width={1440} height={760}>
            <BeforeTable />
          </DCArtboard>
          <DCArtboard id="after" label="After · neutral table, purple-only accent" width={1440} height={760}>
            <AfterTable />
          </DCArtboard>
        </DCSection>

        <DCSection id="notes" title="What changed" subtitle="">
          <DCArtboard id="changelog" label="Notes" width={1440} height={420}>
            <div style={{ padding: "26px 30px", background: "#fff", height: "100%" }}>
              <div className="note">
                <h4>The four moves</h4>
                <ul>
                  <li><b>Killed the green wash &amp; left rail.</b> Table background is now the warm neutral white. Green no longer reads as decorative chrome — it's reserved for one job.</li>
                  <li><b>Green is now strictly semantic.</b> The only green on screen is the <span className="af-check" style={{fontWeight:700}}>✓</span> in the <b>OWNED</b> column (the genuinely exceptional state). Everything else is purple = interaction, or neutral.</li>
                  <li><b>Suppressed the constant-value Status column.</b> Every row was "Public" under this filter — pure noise. Collapsed to a near-invisible 6px dot (<span className="af-status-dot" style={{display:"inline-block"}}></span>) that only gains colour for Private / Missing, reclaiming ~120px for the data.</li>
                  <li><b>Protected the table width &amp; trailing columns.</b> Description capped with <code>minmax(0,1fr)</code> so <b>XREF</b> and <b>OWNED</b> never clip off the right edge. XREF is now a purple cross-link.</li>
                </ul>
                <h4 style={{marginTop:18}}>Plus</h4>
                <ul>
                  <li><b>Rating scale, cool → warm:</b>
                    <span style={{marginLeft:8}}><span className="af-badge" style={{color:"#2f7d52",background:"#eef6f0",borderColor:"#cfe6d8"}}>A</span></span>
                    <span style={{marginLeft:6}}><span className="af-badge" style={{color:"#3a6ea5",background:"#eef2f8",borderColor:"#d4e0ef"}}>B+</span></span>
                    <span style={{marginLeft:6}}><span className="af-badge" style={{color:"#5d6470",background:"#f1f1f3",borderColor:"#e0e1e5"}}>B</span></span>
                    <span style={{marginLeft:6}}><span className="af-badge" style={{color:"#a9701a",background:"#fbf3e6",borderColor:"#eeddc2"}}>C</span></span>
                    — quiet outline pills, deliberate gradient instead of ad-hoc colours.</li>
                  <li><b>Description hierarchy:</b> sound-grade pulled out as a <span className="af-grade">[A]</span> chip, lead clause kept dark, the provenance run-on dimmed — so the structured columns read as the scannable spine.</li>
                  <li><b>Filter chips → pill form</b> with a clear ✕ affordance; year-group headers are sticky and lighter.</li>
                </ul>
              </div>
            </div>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
