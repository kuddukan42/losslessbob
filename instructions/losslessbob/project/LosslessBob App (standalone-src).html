<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>LosslessBob — App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app.css" />
<style>
  /* The app is a fixed 1920×1080 canvas, scaled to fit the viewport. */
  html, body { margin: 0; height: 100%; background: #0b0a08; overflow: hidden; }
  #stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  #frame {
    width: 1920px; height: 1080px; flex: 0 0 1920px;
    transform-origin: center center;
    background: var(--lbb-bg, #faf8f3);
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.45), 0 1px 0 rgba(255,255,255,0.04) inset;
    border-radius: 12px;
  }
  /* Print-friendly */
  @media print { html, body, #stage { background: #fff; } #frame { box-shadow: none; border-radius: 0; } }
</style>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#faf8f3">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="1200" height="800" fill="#faf8f3"/>
    <!-- Sidebar silhouette -->
    <rect x="0" y="0" width="180" height="800" fill="#ffffff"/>
    <rect x="180" y="0" width="1" height="800" fill="#e2dfd2"/>
    <!-- Brand mark -->
    <rect x="500" y="280" width="200" height="200" rx="40" fill="#2b5fd0"/>
    <text x="600" y="415" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="120" font-weight="800" fill="#ffffff" letter-spacing="-4">LB</text>
    <!-- Wordmark -->
    <text x="600" y="560" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="700" fill="#1c1a17" letter-spacing="-1">LosslessBob</text>
    <text x="600" y="600" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="500" fill="#8e8676" letter-spacing="2">CHECKSUM LOOKUP</text>
    <!-- Status pill row hint -->
    <g opacity="0.5">
      <rect x="510" y="640" width="40" height="8" rx="4" fill="#39a360"/>
      <rect x="560" y="640" width="40" height="8" rx="4" fill="#cc9f3d"/>
      <rect x="610" y="640" width="40" height="8" rx="4" fill="#d8604f"/>
      <rect x="660" y="640" width="40" height="8" rx="4" fill="#4c89c4"/>
    </g>
  </svg>
</template>

<div id="stage"><div id="frame"><div id="root"></div></div></div>

<!-- Pinned React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Design system tokens (pre-React load, applies CSS vars before mount) -->
<script src="lbb-tokens.js"></script>
<script>
  // Default theme — overridden by app-main.jsx once mounted.
  window.LBB_TOKENS.applyTheme({ mode: "light", accent: "indigo", density: "default" });
</script>

<!-- Primitives -->
<script type="text/babel" src="lbb-icons.jsx"></script>
<script type="text/babel">
  // Expose Icon globally before any consumer script.
  window.LBB_Icon = Icon;
</script>
<script type="text/babel" src="lbb-ui.jsx"></script>

<!-- Tweaks panel -->
<script type="text/babel" src="tweaks-panel.jsx"></script>

<!-- Shell + screens -->
<script type="text/babel" src="app-shell.jsx"></script>
<script type="text/babel" src="screen-home.jsx"></script>
<script type="text/babel" src="screen-pipeline.jsx"></script>
<script type="text/babel" src="screen-search.jsx"></script>
<script type="text/babel" src="screen-collection.jsx"></script>
<script type="text/babel" src="screen-bootlegs.jsx"></script>
<script type="text/babel" src="screen-drillins.jsx"></script>
<script type="text/babel" src="screen-assets.jsx"></script>
<script type="text/babel" src="screen-settings.jsx"></script>

<!-- App root -->
<script type="text/babel" src="app-main.jsx"></script>
<script type="text/babel">
  // Fit the 1920×1080 frame inside the viewport
  function fit() {
    const stage = document.getElementById("stage");
    const frame = document.getElementById("frame");
    const w = stage.clientWidth, h = stage.clientHeight;
    const scale = Math.min(w / 1920, h / 1080);
    frame.style.transform = `scale(${scale})`;
  }
  window.addEventListener("resize", fit);
  fit();

  ReactDOM.createRoot(document.getElementById("root")).render(<window.LBB_App />);
</script>
</body>
</html>
