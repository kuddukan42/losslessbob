<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>LosslessBob — Mounts &amp; Routes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app.css" />
<style>
  html, body { margin: 0; height: 100%; background: var(--lbb-bg, #faf8f3); }
  #root { min-height: 100%; }
  select:focus { border-color: var(--lbb-accent-mid); }
  input::placeholder { color: var(--lbb-fg3); }
  ::-webkit-scrollbar { width: 11px; height: 11px; }
  ::-webkit-scrollbar-thumb { background: var(--lbb-border2); border-radius: 6px; border: 3px solid var(--lbb-bg); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Design system -->
<script src="lbb-tokens.js"></script>
<script>window.LBB_TOKENS.applyTheme({ mode: "light", accent: "indigo", density: "default" });</script>
<script type="text/babel" src="lbb-icons.jsx"></script>
<script type="text/babel">window.LBB_Icon = Icon;</script>
<script type="text/babel" src="lbb-ui.jsx"></script>

<!-- New surfaces -->
<script type="text/babel" src="mounts-routes.jsx"></script>
<script type="text/babel" src="collect-states.jsx"></script>

<script type="text/babel">
  const Icon = window.LBB_Icon;

  function App() {
    const [view, setView] = React.useState("mounts");   // mounts | pipeline
    const [mode, setMode] = React.useState("light");
    const [accent, setAccent] = React.useState("indigo");
    React.useEffect(() => { window.LBB_TOKENS.applyTheme({ mode, accent, density: "default" }); }, [mode, accent]);

    function resolve(to) { if (to === "mounts") { setView("mounts"); document.getElementById("scroll").scrollTo({ top: 0 }); } }

    const Tab = ({ id, icon, label }) => {
      const on = view === id;
      return (
        <button onClick={() => setView(id)} style={{
          display: "flex", alignItems: "center", gap: 7, padding: "6px 13px", borderRadius: 7, cursor: "pointer", fontFamily: "inherit", whiteSpace: "nowrap",
          background: on ? "var(--lbb-surface)" : "transparent", border: `1px solid ${on ? "var(--lbb-border2)" : "transparent"}`,
          boxShadow: on ? "var(--lbb-shadow)" : "none",
        }}>
          <Icon name={icon} size={15} style={{ color: on ? "var(--lbb-accent-mid)" : "var(--lbb-fg3)" }} />
          <span style={{ fontSize: 12.5, fontWeight: 600, color: on ? "var(--lbb-fg)" : "var(--lbb-fg3)" }}>{label}</span>
        </button>
      );
    };

    return (
      <div style={{ height: "100vh", display: "flex", flexDirection: "column", background: "var(--lbb-bg)", color: "var(--lbb-fg)" }}>
        {/* top chrome */}
        <header style={{ flex: "0 0 auto", padding: "0 24px", height: 60, display: "flex", alignItems: "center", gap: 14, borderBottom: "1px solid var(--lbb-border)", background: "var(--lbb-surface)" }}>
          <div style={{ width: 30, height: 30, borderRadius: 8, background: "var(--lbb-accent-mid)", color: "var(--lbb-accent-onMid)", display: "inline-flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: 14, letterSpacing: -0.02, flex: "0 0 auto" }}>LB</div>
          <div style={{ display: "flex", alignItems: "center", gap: 7, fontSize: 13, flex: "0 0 auto" }}>
            <span style={{ color: "var(--lbb-fg2)", fontWeight: 500 }}>LosslessBob</span>
            <span style={{ color: "var(--lbb-fg3)" }}>/</span>
            <span style={{ color: "var(--lbb-fg)", fontWeight: 600 }}>{view === "mounts" ? "Setup" : "Pipeline"}</span>
          </div>
          <div style={{ display: "flex", gap: 4, marginLeft: 10, padding: 3, background: "var(--lbb-surface2)", borderRadius: 9, border: "1px solid var(--lbb-border)", flex: "0 0 auto" }}>
            <Tab id="mounts" icon="setup" label="Mounts & Routes" />
            <Tab id="pipeline" icon="pipeline" label="Pipeline · Step 5" />
          </div>
          <div style={{ flex: 1 }} />
          {/* theme controls */}
          <div style={{ display: "flex", alignItems: "center", gap: 4, padding: 3, background: "var(--lbb-surface2)", borderRadius: 8, border: "1px solid var(--lbb-border)" }}>
            {["light", "dark"].map(m => (
              <button key={m} onClick={() => setMode(m)} style={{ padding: "4px 10px", borderRadius: 5, cursor: "pointer", fontFamily: "inherit", fontSize: 11.5, fontWeight: mode === m ? 600 : 500, textTransform: "capitalize",
                background: mode === m ? "var(--lbb-surface)" : "transparent", color: mode === m ? "var(--lbb-fg)" : "var(--lbb-fg3)", border: mode === m ? "1px solid var(--lbb-border2)" : "1px solid transparent" }}>{m}</button>
            ))}
          </div>
          <div style={{ position: "relative", display: "inline-flex" }}>
            <select value={accent} onChange={e => setAccent(e.target.value)} style={{ appearance: "none", WebkitAppearance: "none", height: 30, padding: "0 26px 0 12px", borderRadius: 8, border: "1px solid var(--lbb-border2)", background: "var(--lbb-surface)", color: "var(--lbb-fg)", fontFamily: "inherit", fontSize: 12, fontWeight: 500, cursor: "pointer", textTransform: "capitalize", outline: "none" }}>
              {["indigo", "plum", "rust", "forest", "teal", "amber", "gray", "crimson"].map(a => <option key={a} value={a}>{a}</option>)}
            </select>
            <Icon name="chevDown" size={13} style={{ position: "absolute", right: 9, top: "50%", transform: "translateY(-50%)", pointerEvents: "none", color: "var(--lbb-fg3)" }} />
          </div>
        </header>

        {/* scroll body */}
        <div id="scroll" style={{ flex: 1, overflowY: "auto", minHeight: 0 }}>
          <div style={{ maxWidth: view === "mounts" ? 1080 : 1000, margin: "0 auto", padding: "26px 24px 60px" }}>
            <div style={{ marginBottom: 18 }}>
              <h1 style={{ margin: 0, fontSize: 22, fontWeight: 700, letterSpacing: -0.01 }}>{view === "mounts" ? "Mounts & Routes" : "Pipeline · File into collection"}</h1>
              <div style={{ fontSize: 13, color: "var(--lbb-fg3)", marginTop: 3, maxWidth: 720, lineHeight: 1.5 }}>
                {view === "mounts"
                  ? "Configure the drives your collection spans and the year → drive routing that the pipeline’s File step follows. Set it once; filing routes automatically."
                  : "The states Step 5 surfaces once filing is routing-driven — the happy path plus every way a folder can be held, each mapped to its file.error_code."}
              </div>
            </div>
            {view === "mounts" ? <window.LBB_MountsRoutes /> : <window.LBB_CollectStates onResolve={resolve} />}
          </div>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#2b5fd0"/>
    <rect x="30" y="30" width="40" height="13" rx="2.5" fill="#fff"/>
    <rect x="30" y="48" width="40" height="9" rx="2" fill="#fff" opacity="0.55"/>
    <rect x="30" y="61" width="26" height="9" rx="2" fill="#fff" opacity="0.55"/>
  </svg>
</template>
</body>
</html>
