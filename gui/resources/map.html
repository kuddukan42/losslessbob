<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LosslessBob &mdash; Map</title>

    <!-- Leaflet 1.9.4 — served locally via /leaflet/ Flask route -->
    <link rel="stylesheet" href="/leaflet/leaflet.css"/>
    <script src="/leaflet/leaflet.js"></script>

    <!-- Leaflet.markercluster 1.5.3 -->
    <link rel="stylesheet" href="/leaflet/MarkerCluster.css"/>
    <link rel="stylesheet" href="/leaflet/MarkerCluster.Default.css"/>
    <script src="/leaflet/leaflet.markercluster.js"></script>

    <!-- Leaflet.heat 0.2.0 -->
    <script src="/leaflet/leaflet-heat.js"></script>

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Ubuntu, Cantarell, "DejaVu Sans", Arial, sans-serif;
            font-size: 13px;
            background: #f8f8f0;
            color: #1a1a1a;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* ---- Filter bar ---- */
        #filterBar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            background: #e8e8e0;
            border-bottom: 1px solid #ccc;
            flex-shrink: 0;
        }

        #filterBar label {
            font-size: 12px;
            color: #444;
        }

        #filterBar select,
        #filterBar input[type="number"],
        #filterBar input[type="text"] {
            border: 1px solid #bbb;
            border-radius: 4px;
            padding: 3px 6px;
            font-size: 12px;
            background: #fff;
            color: #1a1a1a;
            height: 26px;
        }

        #filterBar input[type="number"] {
            width: 90px;
        }

        #filterBar input[type="text"] {
            width: 180px;
        }

        #filterBar input[type="checkbox"] {
            cursor: pointer;
            width: 14px;
            height: 14px;
            vertical-align: middle;
        }

        #filterBar button {
            background: #1f4e79;
            color: #fff;
            border: none;
            border-radius: 5px;
            padding: 4px 12px;
            font-size: 12px;
            cursor: pointer;
            height: 26px;
        }

        #filterBar button:hover {
            background: #2e6fa3;
        }

        #filterBar button:active {
            background: #14375a;
        }

        #filterBar button.active-toggle {
            background: #c0392b;
        }

        #filterBar button.active-toggle:hover {
            background: #e74c3c;
        }

        #listInSearchBtn {
            display: none;
        }

        .filter-sep {
            width: 1px;
            height: 20px;
            background: #ccc;
            margin: 0 2px;
        }

        /* ---- Map area ---- */
        #map {
            flex: 1;
            min-height: 0;
        }

        /* ---- Stats bar ---- */
        #statsBar {
            flex-shrink: 0;
            padding: 4px 10px;
            background: #e0e0d8;
            border-top: 1px solid #ccc;
            font-size: 12px;
            color: #444;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ---- Popup styling ---- */
        .lb-popup b {
            font-size: 20px;
        }

        .lb-popup {
            font-size: 15px;
            line-height: 1.6;
        }

        .lb-popup .popup-status {
            font-weight: 700;
            font-size: 15px;
            text-transform: capitalize;
        }

        .lb-popup .popup-search-btn {
            display: inline-block;
            margin-top: 8px;
            padding: 6px 14px;
            background: #1f4e79;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
        }

        .lb-popup .popup-search-btn:hover {
            background: #2e6fa3;
        }

        /* ---- Owned ring indicator in legend ---- */
        .legend-owned {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 3px solid white;
            background: #4CAF50;
            vertical-align: middle;
        }

        /* ---- Tile error overlay ---- */
        #tileErrorOverlay {
            display: none;
            position: absolute;
            inset: 0;
            z-index: 1000;
            pointer-events: none;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 24px;
        }
        #tileErrorOverlay.visible {
            display: flex;
        }
        #tileErrorOverlay .tile-error-banner {
            background: rgba(30, 30, 30, 0.88);
            color: #f5f5f5;
            border-radius: 8px;
            padding: 10px 18px;
            font-size: 13px;
            font-family: sans-serif;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.4);
        }
        #tileErrorOverlay .tile-error-icon {
            font-size: 16px;
            line-height: 1;
        }
    </style>
</head>
<body>
<div id="app">

    <!-- Filter bar -->
    <div id="filterBar">
        <label for="statusFilter">Status:</label>
        <select id="statusFilter">
            <option value="">All</option>
            <option value="public">Public</option>
            <option value="private">Private</option>
            <option value="missing">Missing</option>
        </select>

        <div class="filter-sep"></div>

        <label for="ownedFilter">
            <input type="checkbox" id="ownedFilter"> Owned only
        </label>

        <div class="filter-sep"></div>

        <label for="yearMin">Year:</label>
        <input type="number" id="yearMin" placeholder="From" min="1900" max="2100" step="1">
        <span style="font-size:11px; color:#888;">–</span>
        <input type="number" id="yearMax" placeholder="To" min="1900" max="2100" step="1">

        <div class="filter-sep"></div>

        <input type="text" id="textFilter" placeholder="Search LB or location&hellip;">

        <button onclick="applyFilters()">Apply</button>
        <button id="heatmapToggle" onclick="toggleHeatmap()">Heatmap</button>

        <div class="filter-sep"></div>

        <button id="viewportToggle" onclick="toggleViewportFilter()" title="Show only markers in the current map view">Viewport Filter</button>
        <button id="listInSearchBtn" onclick="listViewportInSearch()" title="Load visible LBs in the Search tab">List in Search</button>
    </div>

    <!-- Map -->
    <div id="map">
        <div id="tileErrorOverlay">
            <div class="tile-error-banner">
                <span class="tile-error-icon">⚠</span>
                Map tiles couldn't load — check your internet connection
            </div>
        </div>
    </div>

    <!-- Stats bar -->
    <div id="statsBar">Loading&hellip;</div>

</div>

<script>
    // ---------------------------------------------------------------------------
    // Constants
    // ---------------------------------------------------------------------------

    const STATUS_COLORS = {
        public:  '#00C853',   // vivid green
        private: '#00B0FF',   // vivid cyan-blue
        missing: '#FF6D00',   // vivid deep-orange (more visible than gray)
    };
    const DEFAULT_COLOR = '#E040FB'; // vivid purple — unknown status

    // ---------------------------------------------------------------------------
    // QWebChannel bridge — wires JS to Python when running inside QWebEngineView
    // ---------------------------------------------------------------------------

    let _bridge = null;  // set once QWebChannel initialises

    function _initBridge() {
        if (typeof qt === 'undefined' || !qt.webChannelTransport) return;
        new QWebChannel(qt.webChannelTransport, function(channel) {
            _bridge = channel.objects.bridge;
        });
    }

    // ---------------------------------------------------------------------------
    // Map initialisation
    // ---------------------------------------------------------------------------

    const map = L.map('map', { preferCanvas: true }).setView([30, 0], 2);

    const tileLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
        maxZoom: 19,
    }).addTo(map);

    tileLayer.on('tileerror', function() {
        document.getElementById('tileErrorOverlay').classList.add('visible');
    });
    tileLayer.on('tileload', function() {
        document.getElementById('tileErrorOverlay').classList.remove('visible');
    });

    // Active layers
    let clusterLayer = null;
    let heatLayer = null;
    let heatmapMode = false;

    // All fetched marker data — retained for viewport filtering without re-fetch
    let _allMarkerData = [];

    // Viewport filter state
    let viewportFilterOn = false;

    // ---------------------------------------------------------------------------
    // loadMarkers — fetch data and build layers
    // ---------------------------------------------------------------------------

    function buildQuery(filters) {
        const params = new URLSearchParams();
        if (filters.status)   params.set('status',   filters.status);
        if (filters.owned)    params.set('owned',    'true');
        if (filters.year_min) params.set('year_min', filters.year_min);
        if (filters.year_max) params.set('year_max', filters.year_max);
        if (filters.q)        params.set('q',        filters.q);
        const qs = params.toString();
        return qs ? '?' + qs : '';
    }

    function loadMarkers(filters) {
        if (clusterLayer) { map.removeLayer(clusterLayer); clusterLayer = null; }
        if (heatLayer)    { map.removeLayer(heatLayer);    heatLayer    = null; }

        document.getElementById('statsBar').textContent = 'Loading…';

        const url = '/api/map/data' + buildQuery(filters);

        fetch(url)
            .then(function(resp) {
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                return resp.json();
            })
            .then(function(data) {
                _allMarkerData = data.markers || [];
                const stats    = data.stats   || {};
                _buildLayers(_allMarkerData);
                updateStats(stats, _allMarkerData.length);
                if (viewportFilterOn) applyViewportFilter();
            })
            .catch(function(err) {
                document.getElementById('statsBar').textContent = 'Error loading data: ' + err.message;
            });
    }

    // ---------------------------------------------------------------------------
    // _buildLayers — (re)build cluster + heat layers from a subset of markers
    // ---------------------------------------------------------------------------

    function _buildLayers(markers) {
        if (clusterLayer) { map.removeLayer(clusterLayer); clusterLayer = null; }
        if (heatLayer)    { map.removeLayer(heatLayer);    heatLayer    = null; }

        const CLUSTER_TIERS = [
            { max:   10, bg: '#00E5FF', fg: '#003344', ring: '#00B8D4' },  // cyan
            { max:   50, bg: '#69F0AE', fg: '#003322', ring: '#00C853' },  // mint green
            { max:  150, bg: '#FFD740', fg: '#3E2700', ring: '#FF8F00' },  // amber
            { max:  500, bg: '#FF6D00', fg: '#fff',    ring: '#BF360C' },  // deep orange
            { max: Infinity, bg: '#D500F9', fg: '#fff', ring: '#7B1FA2' }, // vivid purple
        ];

        const group = L.markerClusterGroup({
            maxClusterRadius: 60,
            spiderfyOnMaxZoom: true,
            showCoverageOnHover: false,
            spiderfyDistanceMultiplier: 2.5,
            iconCreateFunction: function(cluster) {
                const count = cluster.getChildCount();
                const tier  = CLUSTER_TIERS.find(t => count < t.max);
                const size  = count < 20 ? 36 : count < 100 ? 44 : count < 500 ? 52 : 62;
                return L.divIcon({
                    html: '<div style="' +
                        'width:' + size + 'px;height:' + size + 'px;' +
                        'border-radius:50%;' +
                        'background:' + tier.bg + ';' +
                        'border:3px solid ' + tier.ring + ';' +
                        'box-shadow:0 0 8px ' + tier.ring + '88;' +
                        'display:flex;align-items:center;justify-content:center;' +
                        'font-weight:700;font-size:' + (count > 999 ? 11 : 13) + 'px;' +
                        'color:' + tier.fg + ';' +
                        'font-family:sans-serif;' +
                        '">' + count + '</div>',
                    className: '',
                    iconSize: [size, size],
                    iconAnchor: [size / 2, size / 2],
                });
            },
        });

        const heatPoints = [];

        markers.forEach(function(m) {
            const lat = m.lat;
            const lon = m.lon;
            if (lat == null || lon == null) return;

            const color   = STATUS_COLORS[m.lb_status] || DEFAULT_COLOR;
            const isOwned = Boolean(m.owned);

            const _sz  = 36;
            const _bdr = isOwned ? '3px solid #FFD600' : '1.5px solid #222';
            const _shd = isOwned ? '0 0 6px #FFD60088' : 'none';
            const icon = L.divIcon({
                html: '<div style="' +
                    'width:' + _sz + 'px;height:' + _sz + 'px;' +
                    'border-radius:50%;' +
                    'background:' + color + ';' +
                    'border:' + _bdr + ';' +
                    'box-shadow:' + _shd + ';' +
                    'opacity:0.95;' +
                    'display:flex;align-items:center;justify-content:center;' +
                    'font-weight:700;font-size:9px;' +
                    'color:#111;' +
                    'font-family:monospace;' +
                    'line-height:1;overflow:hidden;' +
                    '">' + escapeHtml(String(m.lb_number || '')) + '</div>',
                className: '',
                iconSize:   [_sz, _sz],
                iconAnchor: [_sz / 2, _sz / 2],
            });
            const circle = L.marker([lat, lon], { icon: icon });

            // Popup HTML
            let popupHtml =
                '<div class="lb-popup">' +
                '<b>LB ' + escapeHtml(String(m.lb_number || '')) + '</b><br>' +
                escapeHtml(m.date_str || '') + '<br>' +
                escapeHtml(m.location || '') + '<br>';

            if (m.display_name && m.display_name !== m.location) {
                popupHtml += '<em>' + escapeHtml(m.display_name) + '</em><br>';
            }

            popupHtml +=
                '<span class="popup-status" style="color:' + color + '">' +
                escapeHtml(m.lb_status || 'unknown') + '</span>';

            if (isOwned) {
                popupHtml += ' &nbsp;<span style="color:#FFD600; font-size:15px;">★ owned</span>';
            }

            const lbNum = m.lb_number;
            popupHtml +=
                '<br><button class="popup-search-btn" onclick="openInSearch(' + lbNum + ')">' +
                'Open in Search</button>';

            popupHtml += '</div>';

            circle.bindPopup(popupHtml);
            group.addLayer(circle);

            heatPoints.push([lat, lon, isOwned ? 1.5 : 1.0]);
        });

        clusterLayer = group;
        heatLayer = L.heatLayer(heatPoints, {
            radius: 25,
            blur: 18,
            maxZoom: 10,
            gradient: { 0.3: '#4CAF50', 0.6: '#FF9800', 1.0: '#f03' },
        });

        if (heatmapMode) {
            map.addLayer(heatLayer);
        } else {
            map.addLayer(clusterLayer);
        }
    }

    // ---------------------------------------------------------------------------
    // updateStats — update the stats bar text
    // ---------------------------------------------------------------------------

    function updateStats(stats, visibleCount) {
        const plotted   = stats.plotted   != null ? stats.plotted   : _allMarkerData.length;
        const unique    = stats.unique    != null ? stats.unique    : '–';
        const unplot    = stats.unplottable != null ? stats.unplottable : '–';

        if (viewportFilterOn && visibleCount !== plotted) {
            document.getElementById('statsBar').textContent =
                visibleCount + ' in view of ' + plotted + ' plotted | ' +
                unique + ' unique locations | ' + unplot + ' unplottable';
        } else {
            document.getElementById('statsBar').textContent =
                plotted + ' LBs plotted | ' +
                unique + ' unique locations | ' +
                unplot + ' unplottable';
        }
    }

    // ---------------------------------------------------------------------------
    // applyFilters — read filter bar and call loadMarkers
    // ---------------------------------------------------------------------------

    function applyFilters() {
        const filters = {};

        const status = document.getElementById('statusFilter').value;
        if (status) filters.status = status;

        if (document.getElementById('ownedFilter').checked) filters.owned = true;

        const yearMin = document.getElementById('yearMin').value.trim();
        if (yearMin) filters.year_min = yearMin;

        const yearMax = document.getElementById('yearMax').value.trim();
        if (yearMax) filters.year_max = yearMax;

        const q = document.getElementById('textFilter').value.trim();
        if (q) filters.q = q;

        loadMarkers(filters);
    }

    // ---------------------------------------------------------------------------
    // toggleHeatmap — switch between cluster and heat views
    // ---------------------------------------------------------------------------

    function toggleHeatmap() {
        heatmapMode = !heatmapMode;
        const btn = document.getElementById('heatmapToggle');

        if (heatmapMode) {
            btn.textContent = 'Clusters';
            if (clusterLayer) map.removeLayer(clusterLayer);
            if (heatLayer)    map.addLayer(heatLayer);
        } else {
            btn.textContent = 'Heatmap';
            if (heatLayer)    map.removeLayer(heatLayer);
            if (clusterLayer) map.addLayer(clusterLayer);
        }
    }

    // ---------------------------------------------------------------------------
    // Viewport filter — filter displayed markers to the current map bounds
    // ---------------------------------------------------------------------------

    function toggleViewportFilter() {
        viewportFilterOn = !viewportFilterOn;
        const btn     = document.getElementById('viewportToggle');
        const listBtn = document.getElementById('listInSearchBtn');

        if (viewportFilterOn) {
            btn.textContent = 'All Markers';
            btn.classList.add('active-toggle');
            listBtn.style.display = 'inline-block';
            applyViewportFilter();
            map.on('moveend zoomend', applyViewportFilter);
        } else {
            btn.textContent = 'Viewport Filter';
            btn.classList.remove('active-toggle');
            listBtn.style.display = 'none';
            map.off('moveend zoomend', applyViewportFilter);
            _buildLayers(_allMarkerData);
            const statsEl = document.getElementById('statsBar');
            // restore full count
            const plotted = _allMarkerData.length;
            statsEl.textContent = plotted + ' LBs plotted';
        }
    }

    function applyViewportFilter() {
        if (!viewportFilterOn) return;
        const bounds = map.getBounds();
        const visible = _allMarkerData.filter(function(m) {
            return m.lat != null && m.lon != null && bounds.contains([m.lat, m.lon]);
        });
        _buildLayers(visible);
        updateStats({}, visible.length);
    }

    // ---------------------------------------------------------------------------
    // openInSearch — bridge to Python (single LB)
    // ---------------------------------------------------------------------------

    function openInSearch(lbNumber) {
        if (_bridge) {
            _bridge.openInSearch(String(lbNumber));
        }
        // No fallback needed when running in a plain browser — button is informational.
    }

    // ---------------------------------------------------------------------------
    // listViewportInSearch — send all visible LBs to the Search tab
    // ---------------------------------------------------------------------------

    function listViewportInSearch() {
        if (!_bridge) return;
        const bounds = map.getBounds();
        const visible = _allMarkerData.filter(function(m) {
            return m.lat != null && m.lon != null && bounds.contains([m.lat, m.lon]);
        });
        if (visible.length === 0) return;
        const csv = visible.map(function(m) { return m.lb_number; }).join(',');
        _bridge.listInSearch(csv);
    }

    // ---------------------------------------------------------------------------
    // Utility
    // ---------------------------------------------------------------------------

    function escapeHtml(str) {
        if (!str) return '';
        return str
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    // ---------------------------------------------------------------------------
    // Bootstrap
    // ---------------------------------------------------------------------------

    // ---------------------------------------------------------------------------
    // postMessage bridge — allows parent frame (Electron React UI) to push
    // filter updates without navigating the iframe.
    // Expected message shape: { type: 'applyFilters', filters: { status, owned,
    //   year_min, year_max, q, cluster, heatmap } }
    // ---------------------------------------------------------------------------
    window.addEventListener('message', function(evt) {
        if (!evt.data || evt.data.type !== 'applyFilters') return;
        const f = evt.data.filters || {};
        loadMarkers({
            status:   f.status   || undefined,
            owned:    f.owned    || undefined,
            year_min: f.year_min || undefined,
            year_max: f.year_max || undefined,
            q:        f.q        || undefined,
        });
    });

    document.addEventListener('DOMContentLoaded', function() {
        // Hide the built-in filter bar when embedded inside the Electron UI so
        // the React panel on the left drives filtering instead.
        if (new URLSearchParams(window.location.search).get('embedded') === '1') {
            const bar = document.getElementById('filterBar');
            if (bar) bar.style.display = 'none';
        }
        _initBridge();
        loadMarkers({});
    });
</script>
</body>
</html>
