repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff (lint + auto-fix)
        entry: ruff check --fix --force-exclude
        language: python
        additional_dependencies: ["ruff==0.15.16"]
        types: [python]
        pass_filenames: true
      - id: gui-next-typecheck
        name: gui_next typecheck (tsc)
        entry: npm --prefix gui_next run typecheck
        language: system
        files: ^gui_next/.*\.(ts|tsx)$
        pass_filenames: false
