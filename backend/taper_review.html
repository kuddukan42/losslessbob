<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taper Review</title>
  <style>
    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --surface2: #1c2128;
      --border:   #30363d;
      --text:     #e6edf3;
      --muted:    #7d8590;
      --accent:   #2563eb;
      --accent-h: #1d4ed8;
      --success:  #16a34a;
      --warning:  #d97706;
      --danger:   #dc2626;
      --danger-h: #b91c1c;
      --radius:   10px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 15px;
    }
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 { font-size: 1.05rem; font-weight: 600; flex: 1; }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 999px;
      background: rgba(37,99,235,.2);
      color: #93c5fd;
      border: 1px solid rgba(37,99,235,.4);
      white-space: nowrap;
    }
    main {
      max-width: 560px;
      margin: 0 auto;
      padding: 18px 14px 60px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .prog-wrap { background: var(--surface2); border-radius: 4px; height: 6px; overflow: hidden; }
    .prog-bar { height: 100%; border-radius: 4px; background: var(--accent); transition: width .3s; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .lb-title { font-size: 1.3rem; font-weight: 700; }
    .lb-meta { color: var(--muted); font-size: 0.85rem; line-height: 1.5; }
    .lb-meta b { color: var(--text); font-weight: 600; }
    a.lb-link {
      color: #93c5fd;
      font-size: 0.85rem;
      text-decoration: none;
      border: 1px solid rgba(37,99,235,.4);
      background: rgba(37,99,235,.12);
      padding: 8px 12px;
      border-radius: 8px;
      display: inline-block;
      width: fit-content;
    }
    a.lb-link:active { background: rgba(37,99,235,.25); }

    .section-label {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 600;
      margin-top: 4px;
    }
    .evidence-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 0.82rem;
      color: var(--muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
    }
    .evidence-list li {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }
    .evidence-list li::before { content: "·"; }
    .ev-detail { flex: 1; }
    .ev-link {
      color: #93c5fd;
      text-decoration: none;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .ev-link:active { text-decoration: underline; }

    .candidates { display: flex; flex-wrap: wrap; gap: 8px; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 11px 16px;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity .15s, transform .1s;
    }
    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .4; cursor: default; transform: none; }
    .btn-success { background: var(--success); color: #fff; }
    .btn-danger  { background: var(--danger);  color: #fff; }
    .btn-ghost   { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-wide    { width: 100%; }

    .custom-row { display: flex; gap: 8px; }
    .custom-row input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 0.9rem;
    }
    .custom-row input:focus { outline: none; border-color: var(--accent); }

    .footer-row { display: flex; gap: 8px; }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 50px 20px;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    #toast-container {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 999;
      pointer-events: none;
      width: min(90vw, 380px);
    }
    .toast {
      padding: 11px 18px;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 500;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity .25s, transform .25s;
      border: 1px solid transparent;
    }
    .toast.show    { opacity: 1; transform: translateY(0); }
    .toast.success { background: #14532d; color: #86efac; border-color: #16a34a; }
    .toast.error   { background: #450a0a; color: #fca5a5; border-color: #dc2626; }
  </style>
</head>
<body>

<header>
  <h1>🎙️ Taper Review</h1>
  <span class="pill" id="remaining-pill">…</span>
</header>

<main>
  <div class="prog-wrap"><div class="prog-bar" id="prog-bar" style="width:0%"></div></div>
  <div id="content"><div class="empty">Loading conflicts…</div></div>
</main>

<div id="toast-container"></div>

<script>
  const BASE = window.location.origin;
  const LB_DETAIL_BASE = 'http://www.losslessbob.wonderingwhattochoose.com/detail/LB-';

  let queue = [];
  let total = 0;
  let doneThisSession = 0;

  async function api(method, path, body) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body != null) opts.body = JSON.stringify(body);
    const r = await fetch(BASE + path, opts);
    const data = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(data.message || data.error || ('HTTP ' + r.status));
    return data;
  }

  function toast(msg, type) {
    const c = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = 'toast ' + (type || 'success');
    t.textContent = msg;
    c.appendChild(t);
    requestAnimationFrame(() => requestAnimationFrame(() => t.classList.add('show')));
    setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 3200);
  }

  function lbUrl(lb) {
    return LB_DETAIL_BASE + String(lb).padStart(5, '0') + '.html';
  }

  function candidateNames(evidence) {
    const names = new Set();
    for (const ev of evidence) {
      const m = /'([^']+)'/.exec(ev.detail || '');
      if (m) names.add(m[1]);
    }
    return [...names];
  }

  function updateProgress() {
    document.getElementById('remaining-pill').textContent = queue.length + ' remaining';
    const pct = total ? Math.round((doneThisSession / total) * 100) : 0;
    document.getElementById('prog-bar').style.width = Math.min(pct, 100) + '%';
  }

  async function loadQueue() {
    try {
      const data = await api('GET', '/api/tapers/attributions?conflict=1');
      queue = data.attributions || [];
      total = Math.max(total, queue.length + doneThisSession);
      updateProgress();
      renderCurrent();
    } catch (e) {
      document.getElementById('content').innerHTML =
        '<div class="empty">Failed to load conflicts: ' + e.message + '</div>';
    }
  }

  async function renderCurrent() {
    const el = document.getElementById('content');
    if (!queue.length) {
      el.innerHTML = '<div class="empty">🎉 No taper conflicts left to review.</div>';
      return;
    }
    const row = queue[0];
    const lb = row.lb_number;
    el.innerHTML = '<div class="empty">Loading LB-' + lb + '…</div>';

    let entry = {};
    try {
      const data = await api('GET', '/api/entry/' + lb);
      entry = data.entry || {};
    } catch (e) { /* entry fetch is best-effort context; card still works without it */ }

    const candidates = candidateNames(row.evidence || []);
    const evidenceHtml = (row.evidence || [])
      .map(ev => {
        const detail = '<span class="ev-detail">' + escapeHtml(ev.detail) + '</span>';
        if (ev.via_lb == null) return '<li>' + detail + '</li>';
        const label = 'LB-' + String(ev.via_lb).padStart(5, '0');
        const link = '<a class="ev-link" href="' + lbUrl(ev.via_lb) +
          '" target="_blank" rel="noopener">' + label + ' →</a>';
        return '<li>' + detail + link + '</li>';
      }).join('');
    const candButtons = candidates
      .map(name => '<button class="btn btn-success" onclick="doConfirm(' + lb + ', ' +
        escapeHtml(JSON.stringify(name)) + ')">✓ ' + escapeHtml(name) + '</button>').join('');

    el.innerHTML = `
      <div class="card">
        <div class="lb-title">LB-${String(lb).padStart(5, '0')}</div>
        <div class="lb-meta">
          <b>${escapeHtml(entry.date_str || '—')}</b> · ${escapeHtml(entry.location || '—')}<br>
          Parsed taper: <b>${escapeHtml(entry.taper_name || '—')}</b><br>
          Source: ${escapeHtml(entry.source_chain || '—')}
        </div>
        <a class="lb-link" href="${lbUrl(lb)}" target="_blank" rel="noopener">Open full LB page →</a>

        <div class="section-label">Conflict evidence</div>
        <ul class="evidence-list">${evidenceHtml || '<li>No evidence recorded</li>'}</ul>

        <div class="section-label">Confirm as</div>
        <div class="candidates">${candButtons}</div>

        <div class="custom-row">
          <input type="text" id="custom-taper" placeholder="Other taper handle…">
          <button class="btn btn-success" onclick="doConfirmCustom(${lb})">✓</button>
        </div>

        <div class="footer-row">
          <button class="btn btn-danger btn-wide" onclick="doReject(${lb})">✕ Reject / no taper</button>
        </div>
        <button class="btn btn-ghost btn-wide" onclick="doSkip()">Skip for now</button>
      </div>
    `;
  }

  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  async function doConfirm(lb, taper) {
    try {
      await api('POST', '/api/tapers/attributions/' + lb + '/confirm', { taper });
      toast('LB-' + lb + ' confirmed as ' + taper, 'success');
      afterDecision();
    } catch (e) {
      toast('Confirm failed: ' + e.message, 'error');
    }
  }

  function doConfirmCustom(lb) {
    const val = document.getElementById('custom-taper').value.trim();
    if (!val) { toast('Enter a taper name first', 'error'); return; }
    doConfirm(lb, val);
  }

  async function doReject(lb) {
    try {
      await api('POST', '/api/tapers/attributions/' + lb + '/reject', {});
      toast('LB-' + lb + ' rejected', 'success');
      afterDecision();
    } catch (e) {
      toast('Reject failed: ' + e.message, 'error');
    }
  }

  function doSkip() {
    // Move to the back of the local queue; nothing is persisted, so a reload
    // will re-fetch the same conflict (still unresolved server-side).
    queue.push(queue.shift());
    renderCurrent();
  }

  function afterDecision() {
    queue.shift();
    doneThisSession++;
    updateProgress();
    renderCurrent();
  }

  loadQueue();
</script>

</body>
</html>
