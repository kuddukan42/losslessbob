# Tier C contrastive lineage embedding — CC_TAPEMATCH_ADDON Task 7.
# All hyperparameters live here (spec constraint: no magic numbers in code).

AUDIO:
  FS: 16000                # sample rate (Hz) — spec 7.2 log-mel front end
  WIN_SEC: 1.0             # training/inference window (s); 16000 samples
  HOP_SEC: 0.5             # inference hop (s) — matches Tier B eval + nmfp_embed

MEL:                       # torchaudio MelSpectrogram (shared train/infer via melspec.LogMelSpec)
  N_FFT: 1024
  HOP: 256                 # → ~63 frames per 1 s window
  N_MELS: 64               # spec 7.2 (64 bands)
  F_MIN: 60.0
  F_MAX: 7800.0
  TOP_DB: 80.0             # amplitude_to_db clamp
  # per-window standardisation applied after dB (zero-mean/unit-var) — see LogMelSpec.

MODEL:
  EMB_DIM: 128             # spec 7.2
  WIDTH: 64                # base conv width; keeps params <= 10 M (spec 7.2)
  # Encoder: (B,1,64,T) -> (B,128) L2-normalized. See model.ConvEncoder.

AUGMENT:                   # per-op probabilities — synthetic positives model transfer chains (7.1)
  SPEED_WARP:              # ±6% covers observed -56500..+45800 ppm with margin
    P: 0.8
    MAX_PCT: 6.0
  LOWPASS:                 # observed hf_ceilings down to 2.0 kHz
    P: 0.6
    F_MIN_HZ: 1500.0
    F_MAX_HZ: 8000.0
  MP3:                     # lossy lineage named in FN evidence (96-192 kbps)
    P: 0.3                  # ffmpeg subprocess per window — kept modest for train throughput
    KBPS: [96, 128, 160, 192]
  TAPE_HISS:               # additive HF noise
    P: 0.6
    SNR_DB: [10.0, 40.0]
  LEVEL_RIDE:              # slow gain automation
    P: 0.5
    MAX_DB: 6.0
  EQ_TILT:                 # mild spectral tilt
    P: 0.5
    MAX_DB: 6.0
  WOW_FLUTTER:             # slow ±0.3% LFO warp
    P: 0.4
    MAX_PCT: 0.3
    RATE_HZ: [0.5, 6.0]
  GEN_STACK:               # compose 2-3 ops (a 3rd-gen tape = composition of degradations)
    MIN_OPS: 2
    MAX_OPS: 3

TRAIN:
  BATCH_SIZE: 256
  HARD_NEG_MIN_FRAC: 0.25  # >=25% of negatives per batch are same-show hard negatives (7.2)
  TEMPERATURE: 0.07        # NT-Xent / InfoNCE
  LR: 3.0e-4
  WEIGHT_DECAY: 1.0e-4
  EPOCHS: 30
  WARMUP_STEPS: 500
  NUM_WORKERS: 24          # tiny encoder → GPU is CPU-augmentation-bound; parallelize workers
  WINDOWS_PER_SOURCE: 24   # sampled anchor windows per source per epoch
  SEED: 0
  # Hard negatives mined from observations.db same-date different-family pairs,
  # EXCLUDING label_suspect=1. Curator labels are EVAL-ONLY (never training).

EVAL:
  # Reuses the Tier B harness: infer.py writes embed_cache/<date>/LB<lb>.npz,
  # embed_eval.py computes the p10(TP)-p90(TN) gap (gate 7.3.2, >= 0.10).
  MIN_GAP: 0.10
  SELF_AUG_MIN: 0.80       # gate 7.3.1 augmentation sanity

CHECKPOINT: tools/tapematch/embedding/ckpt/tierc.pt   # embedding.checkpoint
ENABLED: false                                         # embedding.enabled default (spec 7.4)
